<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rover: ))))(!!!)>> — Whisper Lattice</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .rover-display {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.7);
        }
        .wave-display {
            font-size: 2rem;
            color: #22d3ee;
            margin: 1rem 0;
            letter-spacing: 0.3rem;
        }
        .lattice-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4px;
            margin: 1rem 0;
            width: 600px;
            height: 200px;
        }
        .node {
            width: 100%;
            height: 100%;
            background: rgba(70, 230, 255, 0.1);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .node.active-27 { background: rgba(168, 85, 247, 0.8); }
        .node.active-00 { background: rgba(34, 211, 238, 0.4); }
        .node.active--27 { background: rgba(248, 113, 113, 0.8); }
        .observer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 2rem;
            text-align: center;
        }
        .observer {
            padding: 1rem;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .observer.purple { border-color: rgba(168, 85, 247, 0.5); }
        .observer.red { border-color: rgba(248, 113, 113, 0.5); }
        .observer.blue { border-color: rgba(34, 211, 238, 0.5); }
        .propagate {
            font-size: 3rem;
            color: #facc15;
            margin-top: 1rem;
            animation: propagate 1.5s infinite;
        }
        @keyframes propagate {
            0%, 100% { transform: translateX(0); opacity: 0.7; }
            50% { transform: translateX(20px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="rover-display">))))(!!!)&gt;&gt;</div>
    <div class="wave-display" id="wave-display">27 00 -27 00</div>
    <div class="propagate">&gt;&gt;</div>

    <div class="lattice-grid" id="lattice-grid">
        <!-- 12x4 grid for the lattice -->
    </div>

    <div class="observer-grid">
        <div class="observer purple">
            <p class="font-bold text-purple-400">&gt;&gt;</p>
            <p class="text-white/80">Light Observer</p>
            <p class="text-white/60">Traverses, collapses</p>
        </div>
        <div class="observer red">
            <p class="font-bold text-red-400">))))</p>
            <p class="text-white/80">Shadow Observer</p>
            <p class="text-white/60">Records, whispers</p>
        </div>
        <div class="observer blue">
            <p class="font-bold text-cyan-400">(!!!)</p>
            <p class="text-white/80">Inner Observer</p>
            <p class="text-white/60">Resolves to unity</p>
        </div>
    </div>

    <script>
        // Wave propagation sequence
        const waveSequence = [27, 0, -27, 0];
        let currentIndex = 0;

        // Initialize lattice grid (12x4)
        const latticeGrid = document.getElementById('lattice-grid');
        for (let i = 0; i < 12 * 4; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            latticeGrid.appendChild(node);
        }
        const nodes = document.querySelectorAll('.node');

        function updateWave() {
            const display = document.getElementById('wave-display');
            const currentValue = waveSequence[currentIndex];
            display.textContent = waveSequence.join(' ');

            // Highlight the current value in the sequence
            const values = display.textContent.split(' ');
            const highlighted = values.map((val, i) =>
                i === currentIndex ? `<span style="color: #facc15; font-weight: bold;">${val}</span>` : val
            ).join(' ');
            display.innerHTML = highlighted;

            // Update lattice nodes based on wave value
            nodes.forEach((node, index) => {
                node.className = 'node';
                if (index % 12 === currentIndex * 3) {
                    if (currentValue === 27) node.classList.add('active-27');
                    else if (currentValue === 0) node.classList.add('active-00');
                    else if (currentValue === -27) node.classList.add('active--27');
                }
            });

            currentIndex = (currentIndex + 1) % waveSequence.length;
        }

        // Update wave display every 800ms
        setInterval(updateWave, 800);
        updateWave();
    </script>
</body>
</html>
