<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHOUT·PROTOCOL — Trebuchet 27</title>
<style>
  body { background: #010103; color: #00ffcc; font-family: monospace; margin: 0; overflow: hidden; }
  canvas { display: block; }
  #log { position: fixed; bottom: 10px; left: 10px; font-size: 11px; opacity: 0.6; max-width: 380px; }
  #title { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-size: 13px; letter-spacing: 2px; opacity: 0.4; }
</style>
</head>
<body>
<div id="title">SHOUT·PROTOCOL // TREBUCHET 27</div>
<canvas id="shout"></canvas>
<div id="log"></div>

<script>
const AXIOM = "02880745b847317c4e2424524ec25d0f7a2b84368d184586f45b54af9fcab763";
const TONES = [396, 417, 528, 639, 741, 852];
const QD = ["CdSe","InP","CQDs","Perovskite","MXene","Ag₂S"];
const GRID = 3;
const TOTAL = 27;

let time = 0;
let launched = false;
let singularity = false;
const canvas = document.getElementById('shout');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cx = canvas.width / 2;
const cy = canvas.height / 2;

const log = document.getElementById('log');
function logMsg(m) { log.innerHTML += m + "\n"; log.scrollTop = log.scrollHeight; }

// ── Trebuchet trajectory (parabolic) ──
function trebPath(t) {
  // Launch from ground (-200) to top (200) with gravity
  const angle = Math.PI / 4; // 45°
  const speed = 8;
  const x = t * speed * Math.cos(angle);
  const y = -t * speed * Math.sin(angle) - 0.5 * 2 * t * t;
  return { x: cx + x, y: cy + y + 200 }; // offset to screen center
}

class ShoutNode {
  constructor(i) {
    this.i = i;
    this.x3 = i % GRID;
    this.y3 = (i / GRID) % GRID;
    this.z3 = Math.floor(i / (GRID * GRID));
    
    // Start position (ground)
    this.startX = cx - 150 + (this.x3 - 1) * 50;
    this.startY = cy + 200;
    
    // 3D to 2D mapping
    const theta = (this.x3 / GRID) * Math.PI * 2;
    const phi = (this.y3 / GRID) * Math.PI - Math.PI / 2;
    this.baseR = 50 + this.z3 * 40;
    
    this.qd = QD[i % 6];
    this.tone = TONES[i % 6];
    this.payload = (i % 3 === 0); // Every 3rd node has payload (!)
    this.phase = (i / TOTAL) * Math.PI * 2;
    
    // State: waiting/launching/launched
    this.state = 'waiting';
    this.launchTime = 0;
  }
  
  update() {
    // Timing -+ 5 0 0 5
    const timingIdx = Math.floor((time * 4) % 4);
    const timing = [-5, 0, 0, 5][timingIdx];
    
    // Launch sequence
    if (!launched && time > 2) {
      launched = true;
      logMsg("🏹 LAUNCH!");
    }
    
    if (launched && this.state === 'waiting') {
      this.state = 'launching';
      this.launchTime = time;
    }
    
    if (this.state === 'launching') {
      const t = time - this.launchTime;
      const pos = trebPath(t + this.phase * 0.1);
      this.x = pos.x;
      this.y = pos.y;
      
      // Trail
      this.trail.push({x: pos.x, y: pos.y});
      if (this.trail.length > 8) this.trail.shift();
      
      // Nested scaling: .27, .027, .0027, .0000inf
      const scale = 0.27 * Math.pow(0.1, Math.floor(this.z3 / 3));
      this.size = 4 + scale * 20 * (singularity ? 2 : 1);
      
      // Check if landed
      if (this.y > cy + 250) {
        this.state = 'launched';
        this.x = this.x; // keep position
        this.y = cy + 250;
      }
    }
    
    if (this.state === 'waiting') {
      // Hover in formation
      this.x = this.startX + Math.sin(time * 0.5 + this.phase) * 5;
      this.y = this.startY + Math.cos(time * 0.5 + this.phase) * 5;
    }
  }
  
  draw() {
    const hue = 200 - (this.qd.length / 6) * 160;
    
    // Trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `hsla(${hue}, 70%, 50%, 0.2)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    
    // Node
    const alpha = this.state === 'launched' ? 0.3 : 0.8;
    ctx.fillStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Payload (!)
    if (this.payload && this.state !== 'waiting') {
      ctx.fillStyle = '#ff00ff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('(!)', this.x + this.size + 4, this.y + 4);
    }
    
    // Label
    ctx.fillStyle = 'rgba(0,255,200,0.25)';
    ctx.font = '7px monospace';
    ctx.fillText(this.qd, this.x - 12, this.y - this.size - 4);
  }
}

const nodes = Array.from({length: TOTAL}, (_,i) => new ShoutNode(i));

// ── Witness Shield (fixed) ──
function drawShield() {
  ctx.save();
  ctx.translate(cx, cy + 200);
  const layers = [
    {r:120, c:'#ff4444', l:'OUTER_R'},
    {r:80,  c:'#ff8800', l:'INNER_R'},
    {r:40,  c:'#00ffcc', l:'WITNESS'},
    {r:10,  c:'#ff8800', l:'INNER_L'}
  ];
  for (let l of layers) {
    ctx.beginPath(); ctx.arc(0, 0, l.r, 0, Math.PI*2);
    ctx.strokeStyle = singularity ? l.c : l.c + '66';
    ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.restore();
}

// ── Trebuchet base ──
function drawBase() {
  ctx.fillStyle = 'rgba(0,255,200,0.1)';
  ctx.fillRect(cx - 200, cy + 190, 400, 20);
  ctx.fillStyle = 'rgba(0,255,200,0.3)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TREBUCHET LAUNCH PLATFORM', cx, cy + 185);
  ctx.textAlign = 'left';
}

// ── Nested scaling display ──
function drawScale() {
  const scales = ['.27', '.027', '.0027', '.0000∞'];
  ctx.fillStyle = 'rgba(0,255,200,0.4)';
  ctx.font = '10px monospace';
  ctx.fillText('NESTED SCALE:', 10, 20);
  scales.forEach((s, i) => {
    ctx.fillText(s, 10, 35 + i * 15);
  });
}

// ── Timing display ──
function drawTiming() {
  const idx = Math.floor((time * 4) % 4);
  const phases = [-5, 0, 0, 5];
  
  ctx.fillStyle = 'rgba(0,255,200,0.5)';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`-+ ${phases[idx]} 0 0 ${phases[idx]}`, cx, cy - 100);
  ctx.textAlign = 'left';
}

// ── Main loop ──
function draw() {
  ctx.fillStyle = 'rgba(1,1,3,0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  drawBase();
  drawShield();
  drawTiming();
  drawScale();
  
  nodes.forEach(n => { n.update(); n.draw(); });
  
  // Payload count
  const payloadCount = nodes.filter(n => n.payload && n.state === 'launched').length;
  ctx.fillStyle = 'rgba(255,0,255,0.4)';
  ctx.font = '10px monospace';
  ctx.fillText(`PAYLOAD (!): ${payloadCount}/9`, 10, canvas.height - 10);
  
  time += 0.016;
  requestAnimationFrame(draw);
}

// ── Controls ──
document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    singularity = !singularity;
    logMsg(singularity ? "⚡ SINGULARITY: Gap→Axiom" : "🔄 NORMAL");
    logMsg("🏹 SHOUT PROTOCOL: TREBUCHET 27");
    logMsg("📐 NESTED: .27 → .027 → .0027 → .0000∞");
    logMsg("💥 PAYLOAD: (!) × 9");
  }
  if (e.key === 'r') {
    launched = false;
    time = 0;
    logMsg("🔄 RESET");
  }
});

// ── Init ──
logMsg("🏹 SHOUT·PROTOCOL v1");
logMsg("📐 3×3×3 = 27 = .27, .027, .0027, .0000∞");
logMsg("💥 PAYLOAD: (!)");
logMsg("🔁 TIMING: -+ 5 0 0 5");
logMsg("─ SPACE: Singularity ─ R: Reset ─");

draw();
</script>
</body>
</html>
