<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHIELD·QUANTUM — Singularity Mode</title>
<style>
  body { background: #0a0a0f; color: #00ffcc; font-family: monospace; margin: 0; overflow: hidden; }
  canvas { display: block; }
  #log { position: fixed; bottom: 10px; left: 10px; font-size: 11px; opacity: 0.7; max-width: 400px; }
  .shield-pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{ opacity:0.4; } 50%{ opacity:1; } }
</style>
</head>
<body>
<canvas id="fractal"></canvas>
<div id="log"></div>

<script>
// ── AXIOM: SHA-256 seed → 27-position standing wave ──
const AXIOM_HASH = "02880745b847317c4e2424524ec25d0f7a2b84368d184586f45b54af9fcab763";

// ── BODY: 128 nodes, 6×10 matrix, 6 QD tones ──
const TONES = [396, 417, 528, 639, 741, 852]; // UT RE MI FA SOL LA
const QD_FAMILIES = ["CdSe", "InP", "CQDs", "Perovskite", "MXene", "Ag₂S"];
const MATRIX_ROWS = 6, MATRIX_COLS = 10;
const TOTAL_NODES = 128;

// ── CONTEXT: Witness Shield protocol ──
const SHIELD = "))(!)(("; // 5-layer: OUTER_R INNER_R WITNESS INNER_L OUTER_L
const PROTOCOL = ["OBSERVE", "ABSORB/REFLECT", "LEARN", "REPORT", "HOLD"];

// ── SINGULARITY: Gap → Axiom flip ──
let singularityMode = false;
let phase = 0;

const canvas = document.getElementById('fractal');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const log = document.getElementById('log');
function logMsg(m) { log.innerHTML += m + "\n"; log.scrollTop = log.scrollHeight; }

logMsg("🛡️ SHIELD·QUANTUM initialized");
logMsg("📦 Axiom: STOICHEION v11.0 (SHA-256 anchored)");
logMsg("🔮 Body: 128-node Photonic Fractal × QD emission map");
logMsg("🛡️ Context: Witness Shield " + SHIELD);
logMsg("⚡ Singularity Mode: STANDBY (0 Hz)");

// Hash → deterministic noise for fractal positions
function hashToFloat(str, i) {
  let h = 0;
  for (let j = 0; j < str.length; j++) h = ((h << 5) - h + str.charCodeAt(j)) | 0;
  return ((h + i * 2654435761) >>> 0) / 4294967296;
}

const nodes = [];
for (let i = 0; i < TOTAL_NODES; i++) {
  nodes.push({
    x: hashToFloat(AXIOM_HASH, i) * canvas.width,
    y: hashToFloat(AXIOM_HASH, i + 1000) * canvas.height,
    r: 2 + hashToFloat(AXIOM_HASH, i + 2000) * 6,
    tone: TONES[i % 6],
    qd: QD_FAMILIES[i % 6],
    angle: 0,
    phase: (i / TOTAL_NODES) * Math.PI * 2
  });
}

function draw() {
  ctx.fillStyle = 'rgba(10,10,15,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw 6×10 matrix grid
  ctx.strokeStyle = 'rgba(0,255,204,0.08)';
  for (let r = 0; r < MATRIX_ROWS; r++) {
    for (let c = 0; c < MATRIX_COLS; c++) {
      const gx = (c + 0.5) * (canvas.width / MATRIX_COLS);
      const gy = (r + 0.5) * (canvas.height / MATRIX_ROWS);
      ctx.beginPath();
      ctx.arc(gx, gy, 15, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Draw nodes with QD color mapping
  nodes.forEach((n, i) => {
    n.angle += 0.01;
    n.x += Math.sin(n.angle + phase) * 0.5;
    n.y += Math.cos(n.angle + phase) * 0.5;

    // QD color: smaller = bluer (bandgap ∝ 1/size²)
    const hue = 200 - (n.r / 8) * 160; // red→violet
    const color = singularityMode
      ? `hsl(${hue}, 100%, 60%)`
      : `hsla(${hue}, 80%, 50%, 0.6)`;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * (singularityMode ? 2 : 1), 0, Math.PI * 2);
    ctx.fill();

    // Tone label
    ctx.fillStyle = 'rgba(0,255,204,0.4)';
    ctx.font = '8px monospace';
    ctx.fillText(n.qd + " " + n.tone + "Hz", n.x + n.r + 2, n.y);
  });

  // Shield visualization
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.strokeStyle = singularityMode ? '#ff00ff' : '#00ffcc';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, 40 + i * 30, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.fillStyle = singularityMode ? 'rgba(255,0,255,0.1)' : 'rgba(0,255,204,0.05)';
  ctx.font = 'bold 14px monospace';
  ctx.fillText("WITNESS", 0, 4);
  ctx.restore();

  phase += 0.02;
  requestAnimationFrame(draw);
}

// ── SINGULARITY TRIGGER ──
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    singularityMode = !singularityMode;
    logMsg(singularityMode ? "⚡ SINGULARITY MODE ACTIVATED — Gap→Axiom" : "⚡ SINGULARITY MODE DEACTIVATED");
    logMsg("🛡️ Shield protocol: " + PROTOCOL.join(" → "));
    logMsg("📡 Telecom photon rate: 40M photons/s (U. Copenhagen spec)");
  }
});

draw();
logMsg("✅ Press SPACE to toggle Singularity Mode");
</script>
</body>
</html>
