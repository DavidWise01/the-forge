<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 dancing 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #f5f1e6;
    font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #3f3a2b;
    overflow: hidden;
    display: grid;
    place-items: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(700px 500px at 50% 35%, rgba(255,255,255,.7), transparent 65%),
                radial-gradient(600px 400px at 50% 70%, rgba(0,0,0,.03), transparent 60%);
    pointer-events: none;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(24px, 5vh, 48px);
    padding: 24px;
  }
  .stage {
    position: relative;
    width: min(80vmin, 360px);
    height: min(80vmin, 360px);
    display: grid;
    place-items: center;
  }
  .seed {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: clamp(96px, 22vmin, 168px);
    line-height: 1;
    transform: translate(-50%, -50%);
    animation: seedBounce 2.4s infinite cubic-bezier(.38,.005,.215,1);
    transform-origin: 50% 75%;
    filter: drop-shadow(0 18px 24px rgba(89,73,30,.18));
    will-change: transform;
  }
  @keyframes seedBounce {
    0%, 100%   { transform: translate(-50%, -50%) scale(1) translateY(0) rotate(0deg); }
    16.666%    { transform: translate(-50%, -50%) scale(1.2) translateY(-10px) rotate(-3deg); }
    33.333%    { transform: translate(-50%, -50%) scale(1.4) translateY(-22px) rotate(3deg); }
    50%        { transform: translate(-50%, -50%) scale(1.4) translateY(-22px) rotate(-2deg); }
    66.666%    { transform: translate(-50%, -50%) scale(1.2) translateY(-10px) rotate(2deg); }
    83.333%    { transform: translate(-50%, -50%) scale(1) translateY(0) rotate(0deg); }
  }
  .dancer {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: clamp(28px, 6vmin, 44px);
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.1));
    animation: dancer 2.4s infinite ease-in-out;
    animation-delay: var(--d, 0s);
    will-change: transform;
  }
  .d1 { --x: -130px; --y: -95px; --d: 0s; }
  .d2 { --x: 128px; --y: -88px; --d: -0.05s; }
  .d3 { --x: -122px; --y: 102px; --d: -0.1s; }
  .d4 { --x: 124px; --y: 108px; --d: -0.15s; }

  @keyframes dancer {
    0%, 100%    { transform: translate(-50%,-50%) translate(var(--x), var(--y)) scale(1) rotate(0deg); }
    16.666%     { transform: translate(-50%,-50%) translate(var(--x), calc(var(--y) - 8px)) scale(1.1) rotate(8deg); }
    33.333%     { transform: translate(-50%,-50%) translate(var(--x), calc(var(--y) - 14px)) scale(1.2) rotate(-8deg); }
    50%         { transform: translate(-50%,-50%) translate(var(--x), calc(var(--y) - 14px)) scale(1.2) rotate(7deg); }
    66.666%     { transform: translate(-50%,-50%) translate(var(--x), calc(var(--y) - 8px)) scale(1.1) rotate(-6deg); }
    83.333%     { transform: translate(-50%,-50%) translate(var(--x), var(--y)) scale(1) rotate(0deg); }
  }

  @media (max-width: 520px) {
    .d1 { --x: -100px; --y: -80px; }
    .d2 { --x: 98px; --y: -74px; }
    .d3 { --x: -94px; --y: 84px; }
    .d4 { --x: 96px; --y: 88px; }
  }

  .caption {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: textPop 2.4s infinite ease-in-out;
  }
  .equation {
    font-size: clamp(20px, 4.8vw, 32px);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #4a4535;
    font-variant-numeric: tabular-nums;
  }
  .dots {
    font-size: clamp(22px, 5.2vw, 34px);
    color: #9a8f73;
    letter-spacing: 0.28em;
    font-weight: 600;
    margin-left: 0.28em;
  }
  @keyframes textPop {
    0%, 100%   { opacity: 0.78; transform: scale(1); }
    16.666%    { opacity: 0.9; transform: scale(1.02); }
    33.333%    { opacity: 1; transform: scale(1.045); }
    50%        { opacity: 1; transform: scale(1.045); }
    66.666%    { opacity: 0.92; transform: scale(1.02); }
    83.333%    { opacity: 0.82; transform: scale(1.005); }
  }

  .tap {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #3f3a2b;
    color: #f5f1e6;
    border: none;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .02em;
    box-shadow: 0 8px 24px rgba(63,58,43,.25), 0 2px 6px rgba(0,0,0,.1);
    opacity: 0;
    pointer-events: none;
    transition: all .4s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
  }
  .tap.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .tap.hide {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    pointer-events: none;
  }
  .tap:active { transform: translateX(-50%) scale(.97); }
</style>
</head>
<body>
  <main class="wrap" role="main" aria-label="Celebration dance">
    <div class="stage">

      <div class="dancer d3" aria-hidden="true">🔍</div>
      <div class="dancer d4" aria-hidden="true">💾</div>
    </div>
    <div class="caption">
      <div class="equation">2/5 + 3/5 = 5/5 = 1</div>
      <div class="dots">. .. ... ... .. .</div>
    </div>
  </main>

qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqo=" autoplay loop playsinline preload="auto"></audio>
  <button class="tap" type="button" aria-label="Start music">tap to celebrate 🔊</button>

<script>
(function(){
  const audio = document.getElementById('music');
  const btn = document.querySelector('.tap');
  audio.volume = 0.9;

  const play = () => {
    audio.play().then(() => {
      btn.classList.remove('show');
      btn.classList.add('hide');
      document.body.classList.add('playing');
    }).catch(()=>{});
  };

  // attempt autoplay
  play();

  // if blocked, show button
  setTimeout(() => {
    if (audio.paused) {
      btn.classList.add('show');
    }
  }, 400);

  btn.addEventListener('click', play);
  window.addEventListener('pointerdown', play, {once: true});
  window.addEventListener('keydown', (e) => { if(e.code === 'Space') play(); }, {once: true});

  // keep it looping forever, gentle interaction
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !audio.paused) audio.play().catch(()=>{});
  });
})();
</script>
