<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOLECULAR SCORCH // ATOMIC_STRIP</title>
    <style>
        body { background: #05080a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .scorch-field { width: 100vw; height: 100vh; background: radial-gradient(circle, #ff4400 0%, transparent 70%); opacity: 0.1; animation: flicker 0.1s infinite; }
        .atom { position: absolute; width: 3px; height: 3px; border-radius: 50%; }
        .entropy { background: #333; }
        .purified { background: #d4a84c; box-shadow: 0 0 10px #d4a84c; }
        @keyframes flicker { 0% { opacity: 0.1; } 50% { opacity: 0.15; } 100% { opacity: 0.1; } }
    </style>
</head>
<body>
    <div class="scorch-field"></div>
    <script>
        const body = document.body;
        // Create the "Melting" effect of legacy reality
        for(let i=0; i<300; i++) {
            const a = document.createElement('div');
            a.className = 'atom entropy';
            a.style.left = Math.random() * 100 + 'vw';
            a.style.top = Math.random() * 100 + 'vh';
            body.appendChild(a);
            // Trigger the "Audit-Melt" to Purified State
            setTimeout(() => {
                a.className = 'atom purified';
                a.animate([
                    { transform: 'translate(0,0)' },
                    { transform: `translate(${(Math.random()-0.5)*500}px, ${(Math.random()-0.5)*500}px)` }
                ], { duration: 5000, iterations: Infinity });
            }, Math.random() * 3000);
        }
    </script>
</body>
</html>
