<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPIDERWEB WITNESS TENSOR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a08; }
body { font-family:'JetBrains Mono', monospace; color:#c4a35a; }
canvas { position:fixed; top:0; left:0; display:block; }

#hud {
  position:fixed; top:0; right:0;
  width:248px; height:100vh;
  padding:18px 14px;
  border-left:1px solid #1a1a14;
  background:rgba(10,10,8,0.94);
  display:flex; flex-direction:column; gap:11px;
  z-index:10; overflow:hidden;
}

.hud-title  { font-size:9px; letter-spacing:.18em; color:#3e3e30; text-transform:uppercase; }
.hud-head   { font-size:13px; font-weight:700; letter-spacing:.06em; margin-top:2px; }

.state-box  {
  border:1px solid #1a1a14; padding:12px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.state-name {
  font-size:15px; font-weight:700; letter-spacing:.08em;
  text-align:center; transition:color 0.4s;
}
.state-glyph {
  font-size:26px; font-weight:700; letter-spacing:.25em;
  color:#c4a35a; transition:all 0.4s;
}
.beat-row {
  display:flex; gap:6px; align-items:center;
}
.beat-dot {
  width:22px; height:22px; border-radius:50%;
  border:1px solid #2a2a20;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; color:#3e3e30; transition:all 0.3s;
}
.beat-dot.active {
  border-color:#c4a35a; color:#c4a35a;
  box-shadow:0 0 8px #c4a35a88;
}
.beat-dot.fired {
  background:#c4a35a22; border-color:#5ac4aa; color:#5ac4aa;
}

.blk  { border:1px solid #1a1a14; padding:10px 11px; }
.blk-label { font-size:8px; letter-spacing:.2em; color:#3e3e30; text-transform:uppercase; margin-bottom:7px; }

.bar-row { display:flex; align-items:center; gap:8px; font-size:10px; margin-bottom:5px; }
.bar-track { flex:1; height:5px; background:#181814; border-radius:3px; overflow:hidden; }
.bar-fill  { height:100%; border-radius:3px; transition:width 0.4s; }
.bar-label { width:24px; color:#3e3e30; text-align:right; font-size:9px; }

.ratio-wrap { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ratio-section { display:flex; flex-direction:column; gap:4px; }
.ratio-label { font-size:8px; color:#3e3e30; letter-spacing:.12em; text-transform:uppercase; }
.ratio-bar-track { height:8px; background:#181814; border-radius:3px; overflow:hidden; }
.ratio-fill-i { height:100%; background:#5ac4aa; border-radius:3px; transition:width .4s; }
.ratio-fill-e { height:100%; background:#c4a35a; border-radius:3px; transition:width .4s; }

.law-box {
  margin-top:auto;
  border:1px solid #181814; padding:10px 11px;
  font-size:9px; color:#3e3e30; line-height:1.8;
}

.log-box {
  border:1px solid #181814; padding:8px 10px;
  font-size:9px; color:#3e3e30; max-height:90px; overflow:hidden;
}
.log-entry { margin-bottom:3px; line-height:1.5; }
.log-entry.expand { color:#5ac4aa; }
.log-entry.coil   { color:#c45a5a; }

#btn-row { display:flex; gap:5px; flex-wrap:wrap; }
button {
  background:none; border:1px solid #252520; color:#c4a35a;
  font-family:'JetBrains Mono',monospace; font-size:9px;
  letter-spacing:.1em; padding:5px 8px; cursor:pointer;
  text-transform:uppercase; transition:all .15s;
}
button:hover { border-color:#c4a35a; background:rgba(196,163,90,.05); }
button.on    { border-color:#5ac4aa; color:#5ac4aa; }

.coherence-row { display:flex; align-items:center; gap:8px; }
input[type="range"] {
  flex:1; height:4px; background:#181814; border-radius:2px;
  outline:none; -webkit-appearance:none; cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px;
  background:#c4a35a; border-radius:50%; cursor:pointer;
}

@media(max-width:600px){
  #hud { width:190px; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div>
    <div class="hud-title">Survival Wave Kernel</div>
    <div class="hud-head">SPIDERWEB WITNESS</div>
  </div>

  <div class="state-box">
    <div class="state-glyph" id="h-glyph">)()(</div>
    <div class="state-name"  id="h-state">LISTEN</div>
    <div class="beat-row">
      <div class="beat-dot" id="bd-2">−2</div>
      <div class="beat-dot" id="bd-1">−1</div>
      <div class="beat-dot" id="bd0">0</div>
    </div>
  </div>

  <div class="blk">
    <div class="blk-label">Coherence</div>
    <div class="bar-row">
      <div class="bar-track" style="flex:1">
        <div class="bar-fill" id="h-coh-bar" style="width:65%;background:#c4a35a"></div>
      </div>
      <div class="bar-label" id="h-coh-pct">65%</div>
    </div>
    <div class="coherence-row">
      <span style="font-size:9px;color:#3e3e30">THREAT</span>
      <input type="range" id="cohSlider" min="0" max="100" value="65">
      <span style="font-size:9px;color:#3e3e30">OPPTY</span>
    </div>
  </div>

  <div class="blk">
    <div class="blk-label">Field Ratio</div>
    <div class="ratio-wrap">
      <div class="ratio-section">
        <div class="ratio-label">Internal 2/5</div>
        <div class="ratio-bar-track">
          <div class="ratio-fill-i" id="h-int-bar" style="width:40%"></div>
        </div>
      </div>
      <div class="ratio-section">
        <div class="ratio-label">External 3/5</div>
        <div class="ratio-bar-track">
          <div class="ratio-fill-e" id="h-ext-bar" style="width:60%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="blk">
    <div class="blk-label">Disturbance Log</div>
    <div class="log-box" id="h-log">
      <div class="log-entry" style="color:#3e3e30">— waiting —</div>
    </div>
  </div>

  <div id="btn-row">
    <button id="btn-trigger">TRIGGER</button>
    <button id="btn-reset">RESET</button>
    <button id="btn-slow">SLOW</button>
    <button id="btn-fast">FAST</button>
  </div>

  <div class="law-box">
    Feel before impact.<br>
    Coil before collapse.<br>
    Act only through coherence.<br>
    Reset before corruption.<br>
    Repeat.
  </div>
</div>

<script>
'use strict';

/* ── Canvas setup ──────────────────────────────────── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const HUD_W  = () => window.innerWidth > 600 ? 248 : 190;

let W, H, CX, CY, MAX_R, INNER_R, CORE_BASE_R;

function resize() {
  W = canvas.width  = window.innerWidth  - HUD_W();
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  MAX_R      = Math.min(CX, CY) * 0.84;
  INNER_R    = MAX_R * 0.40;   // 2/5 boundary
  CORE_BASE_R= MAX_R * 0.09;
}
window.addEventListener('resize', resize);

/* ── Web geometry ──────────────────────────────────── */
const NUM_RADIALS = 12;
const RING_FRACS  = [0.14, 0.23, 0.33, 0.40, 0.50, 0.62, 0.74, 0.88];
// index 3 = exactly the 2/5 boundary

// Slight irregularity per radial (organic feel)
const radialJitter = Array.from({length:NUM_RADIALS}, () => 0.92 + Math.random()*0.16);
const threadPhases = Array.from({length:NUM_RADIALS}, () => Math.random()*Math.PI*2);
const ringPhases   = Array.from({length:RING_FRACS.length}, () => Math.random()*Math.PI*2);

/* ── Colors ────────────────────────────────────────── */
const COL = {
  bg:      '#0a0a08',
  amber:   [196, 163, 90],
  teal:    [90,  196, 170],
  red:     [196, 80,  80],
  white:   [240, 240, 230],
  dimLine: '#1e1e18',
};

function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function lerp(a, b, t) { return a + (b-a)*t; }
function lerpColor(c1, c2, t) {
  return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)];
}
function smoothstep(t) { return t*t*(3-2*t); }

/* ── State machine ─────────────────────────────────── */
const STATES = {
  LISTEN: { glyph:')()(', color:COL.amber,  coreM:1.0,  amplM:0.28, freq:1.3, beatLabel:'—'    },
  SENSE:  { glyph:')()(', color:[255,200,70], coreM:0.93, amplM:0.75, freq:3.2, beatLabel:'−2' },
  CHECK:  { glyph:')()(', color:[255,145,55], coreM:0.85, amplM:1.10, freq:5.0, beatLabel:'−1' },
  COIL:   { glyph:'()',   color:COL.red,    coreM:0.35, amplM:0.12, freq:9.0, beatLabel:'0'    },
  STRIKE: { glyph:'·',   color:[255,60,60], coreM:0.04, amplM:3.50, freq:14., beatLabel:'0'    },
  FOLD:   { glyph:'-1',  color:[120,70,70], coreM:0.25, amplM:0.08, freq:0.8, beatLabel:'0'    },
  EXPAND: { glyph:'(·)', color:COL.teal,   coreM:1.5,  amplM:0.80, freq:2.5, beatLabel:'0'     },
  BLOOM:  { glyph:'((·))',color:[90,255,200],coreM:2.0, amplM:0.45, freq:1.6, beatLabel:'+'     },
  HOLD:   { glyph:'(=)', color:[90,196,170], coreM:1.4, amplM:0.35, freq:1.5, beatLabel:'+'    },
  REST:   { glyph:'0',   color:[130,150,140],coreM:0.9, amplM:0.12, freq:0.9, beatLabel:'—'    },
};

const sim = {
  state:     'LISTEN',
  prevState: 'LISTEN',
  stateT:    1.0,   // 0=entering, 1=fully in
  stateAge:  0,
  coherence: 0.65,
  disturbances: [],
  particles:    [],
  speed: 1.0,
  autoTimer: 5.0,
  log: [],
};

const T = { elapsed:0, dt:0, prev:performance.now() };

/* ── State transition ──────────────────────────────── */
function enterState(name) {
  if (sim.state === name) return;
  sim.prevState = sim.state;
  sim.state     = name;
  sim.stateT    = 0;
  sim.stateAge  = 0;
}

function getBlend(key) {
  const cur  = STATES[sim.state];
  const prev = STATES[sim.prevState];
  const t    = smoothstep(Math.min(sim.stateT, 1));
  if (key === 'color') return lerpColor(prev.color, cur.color, t);
  return lerp(prev[key], cur[key], t);
}

/* ── Disturbances ──────────────────────────────────── */
function triggerDisturbance(angle, isCoherent) {
  sim.disturbances.push({
    angle,
    r: MAX_R,
    speed: 115,
    amplitude: 1.0,
    isCoherent,
    sensed: false,
    checked: false,
    decided: false,
    opacity: 1.0,
  });
  // Spawn a "fly" particle at the hit point
  sim.particles.push({
    x: CX + Math.cos(angle) * MAX_R,
    y: CY + Math.sin(angle) * MAX_R,
    vx: -Math.cos(angle) * 1.5,
    vy: -Math.sin(angle) * 1.5,
    life: 1.0,
    maxLife: 1.5,
    size: 3.5,
    color: isCoherent ? COL.teal : COL.red,
    type: 'fly',
  });
}

function triggerBloomParticles() {
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2;
    const ri = Math.floor(Math.random() * NUM_RADIALS);
    const radA = (ri / NUM_RADIALS) * Math.PI * 2;
    const sp = 60 + Math.random() * 120;
    sim.particles.push({
      x: CX, y: CY,
      vx: Math.cos(radA + (Math.random()-0.5)*0.4) * sp,
      vy: Math.sin(radA + (Math.random()-0.5)*0.4) * sp,
      life: 1.0, maxLife: 1.0 + Math.random()*0.8,
      size: 1.5 + Math.random()*2,
      color: COL.teal, type: 'bloom',
    });
  }
}

function triggerStrikeParticles() {
  for (let i = 0; i < 80; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 200;
    sim.particles.push({
      x: CX, y: CY,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1.0, maxLife: 0.6 + Math.random()*0.5,
      size: 1 + Math.random()*3,
      color: COL.red, type: 'strike',
    });
  }
}

/* ── Logging ───────────────────────────────────────── */
function addLog(msg, type) {
  const t = T.elapsed.toFixed(1);
  sim.log.unshift({ msg:`[${t}s] ${msg}`, type });
  if (sim.log.length > 5) sim.log.pop();
  const el = document.getElementById('h-log');
  el.innerHTML = sim.log.map(e=>`<div class="log-entry ${e.type}">${e.msg}</div>`).join('');
}

/* ── Update ────────────────────────────────────────── */
const STATE_DURATIONS = {
  SENSE:0.7, CHECK:0.55, COIL:0.85, STRIKE:0.5, FOLD:0.9, EXPAND:0.6, BLOOM:1.0, HOLD:0.75, REST:1.1
};

function update() {
  const now = performance.now();
  T.dt      = Math.min((now - T.prev)/1000, 0.05) * sim.speed;
  T.prev    = now;
  T.elapsed = (now - sim.elapsed_start||(sim.elapsed_start=now), (now-sim.elapsed_start)/1000);

  sim.stateT   = Math.min(1, sim.stateT   + T.dt * 5);
  sim.stateAge += T.dt;

  // Auto-disturbance
  sim.autoTimer -= T.dt;
  if (sim.autoTimer <= 0 && sim.state === 'LISTEN') {
    sim.autoTimer = 4.5 + Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    const isCoherent = Math.random() < sim.coherence;
    triggerDisturbance(angle, isCoherent);
  }

  // Update disturbances — wave moves inward, triggers state machine
  for (const d of sim.disturbances) {
    d.r       -= d.speed * T.dt;
    d.amplitude *= (1 - T.dt * 0.25);
    d.opacity  = Math.max(0, d.amplitude);

    if (!d.sensed && d.r <= MAX_R * 0.70) {
      d.sensed = true;
      if (sim.state === 'LISTEN') enterState('SENSE');
    }
    if (!d.checked && d.r <= MAX_R * 0.50) {
      d.checked = true;
      if (sim.state === 'SENSE') enterState('CHECK');
    }
    if (!d.decided && d.r <= MAX_R * 0.40) {
      d.decided = true;
      if (sim.state === 'CHECK') {
        if (d.isCoherent) {
          enterState('EXPAND');
          addLog('OPPORTUNITY → EXPAND', 'expand');
        } else {
          enterState('COIL');
          addLog('THREAT → COIL', 'coil');
        }
      }
    }
  }
  sim.disturbances = sim.disturbances.filter(d => d.r > -80 && d.opacity > 0.01);

  // Timed state advances
  const dur = STATE_DURATIONS[sim.state];
  if (dur && sim.stateAge >= dur) {
    const next = {
      SENSE:  'LISTEN',  // fallback if no disturbance arrived
      CHECK:  'LISTEN',
      COIL:   Math.random() < 0.5 ? 'STRIKE' : 'FOLD',
      STRIKE: 'REST',
      FOLD:   'REST',
      EXPAND: 'BLOOM',
      BLOOM:  'HOLD',
      HOLD:   'REST',
      REST:   'LISTEN',
    }[sim.state];
    if (next) {
      if (sim.state === 'BLOOM') { triggerBloomParticles(); addLog('EXPAND → BLOOM → HOLD','expand'); }
      if (sim.state === 'STRIKE') { triggerStrikeParticles(); addLog('STRIKE → REST','coil'); }
      if (sim.state === 'FOLD') addLog('FOLD → REST → BUNKER','coil');
      enterState(next);
    }
  }

  // Update particles
  for (const p of sim.particles) {
    p.x   += p.vx * T.dt;
    p.y   += p.vy * T.dt;
    p.vx  *= (1 - T.dt * 2.5);
    p.vy  *= (1 - T.dt * 2.5);
    p.life -= T.dt / p.maxLife;
  }
  sim.particles = sim.particles.filter(p => p.life > 0);
}

/* ── Draw web ──────────────────────────────────────── */
function drawWeb() {
  const t    = T.elapsed;
  const ampM = getBlend('amplM');
  const freq = getBlend('freq');
  const col  = getBlend('color');

  const RADIAL_PTS = 48;
  const RING_PTS   = 120;

  // Disturbance field — extra amplitude near wave fronts
  function disturbanceExtra(r, theta) {
    let extra = 0;
    for (const d of sim.disturbances) {
      const dr  = Math.abs(r - d.r);
      const decay = Math.exp(-dr * dr / (MAX_R * MAX_R * 0.008));
      extra += d.amplitude * decay * 0.6;
    }
    return extra;
  }

  // ── Radial threads ──────────────────────────────
  for (let i = 0; i < NUM_RADIALS; i++) {
    const theta    = (i / NUM_RADIALS) * Math.PI * 2;
    const threadLen= MAX_R * radialJitter[i];
    const phase    = threadPhases[i];

    // Gradient: teal in inner zone → amber in outer
    ctx.save();
    const innerEnd = { x: CX + Math.cos(theta)*INNER_R, y: CY + Math.sin(theta)*INNER_R };
    const outerEnd = { x: CX + Math.cos(theta)*threadLen, y: CY + Math.sin(theta)*threadLen };
    const grad = ctx.createLinearGradient(CX, CY, outerEnd.x, outerEnd.y);
    grad.addColorStop(0,    rgba(COL.teal,  0.0));
    grad.addColorStop(0.38, rgba(COL.teal,  0.30));
    grad.addColorStop(0.40, rgba(col,       0.45));
    grad.addColorStop(1.0,  rgba(col,       0.15));
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 0.8;
    ctx.beginPath();

    for (let p = 0; p <= RADIAL_PTS; p++) {
      const r   = (p / RADIAL_PTS) * threadLen;
      const amp = ampM * MAX_R * 0.042 * (1 + disturbanceExtra(r, theta));
      // Standing wave fixed at r=0 and r=threadLen
      const wave = amp * Math.sin(Math.PI * r / threadLen * 2.5)
                      * Math.cos(freq * t + phase);
      const x = CX + Math.cos(theta)*r - Math.sin(theta)*wave;
      const y = CY + Math.sin(theta)*r + Math.cos(theta)*wave;
      p === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── Ring threads ───────────────────────────────
  for (let ri = 0; ri < RING_FRACS.length; ri++) {
    const frac     = RING_FRACS[ri];
    const r_base   = frac * MAX_R;
    const isBoundary = ri === 3; // 2/5 boundary
    const isInner  = frac <= 0.40;
    const phase    = ringPhases[ri];
    const ringAmp  = ampM * MAX_R * 0.025;

    const ringCol = isInner ? COL.teal : col;
    const alpha   = isBoundary ? 0.60 : isInner ? 0.28 : 0.20;

    ctx.save();
    if (isBoundary) {
      ctx.shadowBlur  = 8;
      ctx.shadowColor = rgba(col, 0.6);
    }
    ctx.strokeStyle = rgba(ringCol, alpha);
    ctx.lineWidth   = isBoundary ? 1.2 : 0.7;
    ctx.beginPath();

    for (let p = 0; p <= RING_PTS; p++) {
      const theta = (p / RING_PTS) * Math.PI * 2;
      const distExtra = disturbanceExtra(r_base, theta);
      const amp = ringAmp * (1 + distExtra);
      // Wave travels around the ring
      const wave = amp * Math.sin(5 * theta - freq * t * 0.9 + phase);
      const r    = r_base + wave;
      const x    = CX + Math.cos(theta) * r;
      const y    = CY + Math.sin(theta) * r;
      p === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── Intersection nodes ──────────────────────────
  ctx.save();
  for (let i = 0; i < NUM_RADIALS; i++) {
    const theta = (i / NUM_RADIALS) * Math.PI * 2;
    for (let ri = 0; ri < RING_FRACS.length; ri++) {
      const r = RING_FRACS[ri] * MAX_R;
      const amp = ampM * MAX_R * 0.042;
      const wave = amp * Math.sin(Math.PI * r / MAX_R * 2.5)
                      * Math.cos(freq * t + threadPhases[i]);
      const x = CX + Math.cos(theta)*r - Math.sin(theta)*wave;
      const y = CY + Math.sin(theta)*r + Math.cos(theta)*wave;
      const isBoundary = ri === 3;
      const isInner    = ri <= 3;
      const nodeCol    = isInner ? COL.teal : col;
      const nodeAlpha  = isBoundary ? 0.7 : 0.35;
      ctx.fillStyle = rgba(nodeCol, nodeAlpha);
      ctx.beginPath();
      ctx.arc(x, y, isBoundary ? 2.2 : 1.4, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();

  // ── 2/5 label ──────────────────────────────────
  ctx.save();
  ctx.font = '8px "JetBrains Mono"';
  ctx.fillStyle = rgba(col, 0.3);
  ctx.textAlign = 'left';
  ctx.fillText('2/5 ─ internal', CX + INNER_R + 6, CY - 6);
  ctx.fillStyle = rgba(COL.teal, 0.25);
  ctx.fillText('3/5 ─ external', CX + INNER_R + 6, CY + 10);
  ctx.restore();
}

/* ── Draw disturbance waves ────────────────────────── */
function drawDisturbances() {
  for (const d of sim.disturbances) {
    if (d.r < 0 || d.opacity < 0.02) continue;
    const col  = d.isCoherent ? COL.teal : COL.red;
    const arcW = Math.PI * 0.65; // arc span (not full circle — directional)

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    // Outer glow arc
    ctx.strokeStyle = rgba(col, d.opacity * 0.20);
    ctx.lineWidth   = 18;
    ctx.shadowBlur  = 20;
    ctx.shadowColor = rgba(col, 0.8);
    ctx.beginPath();
    ctx.arc(CX, CY, d.r, d.angle - arcW/2, d.angle + arcW/2);
    ctx.stroke();

    // Core arc
    ctx.strokeStyle = rgba(col, d.opacity * 0.55);
    ctx.lineWidth   = 2.5;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(CX, CY, d.r, d.angle - arcW/2, d.angle + arcW/2);
    ctx.stroke();

    // Leading edge dot
    const ex = CX + Math.cos(d.angle) * d.r;
    const ey = CY + Math.sin(d.angle) * d.r;
    ctx.fillStyle = rgba(col, d.opacity * 0.9);
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(ex, ey, 4, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
}

/* ── Draw core ─────────────────────────────────────── */
function drawCore() {
  const col   = getBlend('color');
  const coreM = getBlend('coreM');
  const pulse = 1 + Math.sin(T.elapsed * (2 + getBlend('freq') * 0.3)) * 0.08;
  const r     = CORE_BASE_R * coreM * pulse;

  ctx.save();

  // Outer glow passes
  for (let i = 4; i >= 0; i--) {
    const sz = r * (1 + i * 0.7);
    ctx.fillStyle   = rgba(col, (0.6-i*0.12)*0.25);
    ctx.shadowBlur  = 30 + i * 14;
    ctx.shadowColor = rgba(col, 0.9);
    ctx.beginPath();
    ctx.arc(CX, CY, sz, 0, Math.PI * 2);
    ctx.fill();
  }

  // Core body
  const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
  g.addColorStop(0,    'rgba(255,255,255,0.95)');
  g.addColorStop(0.3,  rgba(col, 0.95));
  g.addColorStop(0.75, rgba(col, 0.75));
  g.addColorStop(1,    rgba(col, 0.4));
  ctx.fillStyle = g;
  ctx.shadowBlur = 20; ctx.shadowColor = rgba(col, 1);
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.fill();

  // During COIL: compressed tension rings
  if (sim.state === 'COIL' || sim.state === 'CHECK') {
    ctx.globalCompositeOperation = 'lighter';
    for (let ring = 0; ring < 3; ring++) {
      const ringR = r * (1.8 + ring * 0.8);
      const a     = 0.35 - ring * 0.10;
      ctx.strokeStyle = rgba(col, a);
      ctx.lineWidth = 1;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(CX, CY, ringR, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // During EXPAND/BLOOM/HOLD: radiating rings
  if (['EXPAND','BLOOM','HOLD'].includes(sim.state)) {
    ctx.globalCompositeOperation = 'lighter';
    const age = sim.stateAge;
    for (let ring = 0; ring < 4; ring++) {
      const progress = ((age * 0.7 + ring * 0.25) % 1);
      const ringR    = r + progress * MAX_R * 0.5;
      const alpha    = (1 - progress) * 0.4;
      ctx.strokeStyle = rgba(COL.teal, alpha);
      ctx.lineWidth   = 1.5 * (1 - progress);
      ctx.shadowBlur  = 10;
      ctx.beginPath();
      ctx.arc(CX, CY, ringR, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

/* ── Draw particles ────────────────────────────────── */
function drawParticles() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of sim.particles) {
    ctx.globalAlpha = p.life * 0.85;
    ctx.fillStyle   = rgba(p.color, p.life);
    ctx.shadowBlur  = 6;
    ctx.shadowColor = rgba(p.color, 1);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

/* ── Draw outer boundary ────────────────────────────── */
function drawBoundary() {
  ctx.save();
  ctx.strokeStyle = rgba(COL.amber, 0.08);
  ctx.lineWidth   = 0.5;
  ctx.beginPath();
  ctx.arc(CX, CY, MAX_R * 0.92, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

/* ── Stars ─────────────────────────────────────────── */
const stars = Array.from({length:80}, ()=>({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.0+0.2, a: Math.random()*0.3+0.04
}));
function drawStars() {
  stars.forEach(s=>{
    ctx.save();
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#6a6a50';
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

/* ── HUD update ────────────────────────────────────── */
function updateHUD() {
  const st = STATES[sim.state];
  const col = getBlend('color');

  document.getElementById('h-glyph').textContent = st.glyph;
  document.getElementById('h-glyph').style.color = `rgb(${col[0]},${col[1]},${col[2]})`;
  document.getElementById('h-state').textContent = st.beatLabel !== '—'
    ? `${sim.state} · beat ${st.beatLabel}`
    : sim.state;
  document.getElementById('h-state').style.color = `rgb(${col[0]},${col[1]},${col[2]})`;

  // Beat dots
  const beats = {'-2':'bd-2', '-1':'bd-1', '0':'bd0'};
  for (const [b, id] of Object.entries(beats)) {
    const el = document.getElementById(id);
    el.className = 'beat-dot' + (st.beatLabel === b ? ' active' : '');
  }

  // Coherence bar
  document.getElementById('h-coh-bar').style.width = (sim.coherence*100).toFixed(0)+'%';
  document.getElementById('h-coh-bar').style.background = sim.coherence > 0.5
    ? `rgb(${COL.teal[0]},${COL.teal[1]},${COL.teal[2]})`
    : `rgb(${COL.red[0]},${COL.red[1]},${COL.red[2]})`;
  document.getElementById('h-coh-pct').textContent = (sim.coherence*100).toFixed(0)+'%';

  // Field ratio bars (they fluctuate slightly based on state)
  const disturbCount = sim.disturbances.length;
  const externalLoad = Math.min(1, 0.6 + disturbCount * 0.1);
  const internalLoad = Math.min(1, 0.4 + (sim.state !== 'LISTEN' ? 0.15 : 0));
  document.getElementById('h-int-bar').style.width = (internalLoad*100).toFixed(0)+'%';
  document.getElementById('h-ext-bar').style.width = (externalLoad*100).toFixed(0)+'%';
}

/* ── Main loop ─────────────────────────────────────── */
function render() {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawBoundary();
  drawWeb();
  drawDisturbances();
  drawCore();
  drawParticles();
}

function loop(ts) {
  if (!sim.elapsed_start) sim.elapsed_start = ts;
  T.elapsed = (ts - sim.elapsed_start) / 1000;
  T.dt = Math.min((ts - T.prev) / 1000, 0.05) * sim.speed;
  T.prev = ts;
  sim.stateT   = Math.min(1, sim.stateT + T.dt * 5);
  sim.stateAge += T.dt;

  // Auto-disturbance
  sim.autoTimer -= T.dt;
  if (sim.autoTimer <= 0 && sim.state === 'LISTEN') {
    sim.autoTimer = 4.5 + Math.random() * 5;
    const angle = Math.random() * Math.PI * 2;
    triggerDisturbance(angle, Math.random() < sim.coherence);
  }

  // Update disturbances
  for (const d of sim.disturbances) {
    d.r -= d.speed * T.dt;
    d.amplitude = Math.max(0, d.amplitude * (1 - T.dt * 0.18));
    d.opacity = d.amplitude;
    if (!d.sensed && d.r <= MAX_R * 0.70) {
      d.sensed = true;
      if (sim.state === 'LISTEN') enterState('SENSE');
    }
    if (!d.checked && d.r <= MAX_R * 0.50) {
      d.checked = true;
      if (sim.state === 'SENSE') enterState('CHECK');
    }
    if (!d.decided && d.r <= INNER_R) {
      d.decided = true;
      if (sim.state === 'CHECK') {
        if (d.isCoherent) { enterState('EXPAND'); addLog('OPPORTUNITY → EXPAND','expand'); }
        else              { enterState('COIL');   addLog('THREAT → COIL','coil'); }
      }
    }
  }
  sim.disturbances = sim.disturbances.filter(d => d.r > -80 && d.opacity > 0.01);

  // Timed state advances
  const dur = STATE_DURATIONS[sim.state];
  if (dur && sim.stateAge >= dur) {
    const next = {
      SENSE:'LISTEN', CHECK:'LISTEN',
      COIL: Math.random() < 0.5 ? 'STRIKE' : 'FOLD',
      STRIKE:'REST', FOLD:'REST',
      EXPAND:'BLOOM', BLOOM:'HOLD', HOLD:'REST', REST:'LISTEN',
    }[sim.state];
    if (next) {
      if (sim.state === 'BLOOM')  triggerBloomParticles();
      if (sim.state === 'STRIKE') triggerStrikeParticles();
      enterState(next);
    }
  }

  // Particles
  for (const p of sim.particles) {
    p.x += p.vx * T.dt; p.y += p.vy * T.dt;
    p.vx *= (1 - T.dt * 2.8); p.vy *= (1 - T.dt * 2.8);
    p.life -= T.dt / p.maxLife;
  }
  sim.particles = sim.particles.filter(p => p.life > 0);

  render();
  updateHUD();
  requestAnimationFrame(loop);
}

/* ── Controls ──────────────────────────────────────── */
canvas.addEventListener('click', e => {
  const dx = e.clientX - CX, dy = e.clientY - CY;
  const r  = Math.hypot(dx, dy);
  if (r > MAX_R * 0.5 && r < MAX_R * 1.2) {
    const angle = Math.atan2(dy, dx);
    triggerDisturbance(angle, Math.random() < sim.coherence);
  }
});

document.getElementById('btn-trigger').addEventListener('click', () => {
  const angle = Math.random() * Math.PI * 2;
  triggerDisturbance(angle, Math.random() < sim.coherence);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  sim.disturbances = []; sim.particles = [];
  enterState('LISTEN');
  sim.log = [];
  document.getElementById('h-log').innerHTML = '<div class="log-entry" style="color:#3e3e30">— reset —</div>';
});

document.getElementById('btn-slow').addEventListener('click', function() {
  sim.speed = 0.25; this.classList.add('on');
  document.getElementById('btn-fast').classList.remove('on');
});
document.getElementById('btn-fast').addEventListener('click', function() {
  sim.speed = 3.0; this.classList.add('on');
  document.getElementById('btn-slow').classList.remove('on');
});

document.getElementById('cohSlider').addEventListener('input', e => {
  sim.coherence = e.target.value / 100;
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-trigger').click(); }
  if (e.code === 'KeyR')  document.getElementById('btn-reset').click();
});

/* ── Init ──────────────────────────────────────────── */
resize();
sim.elapsed_start = null;
T.prev = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
