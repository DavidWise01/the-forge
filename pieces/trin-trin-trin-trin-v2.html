<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d20 · Twenty Faces · Avan's Eye</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --void:#050008;
    --bone:#f5f0e6;
    --purple:#a040ff;
    --purple-bright:#c080ff;
    --ice:#c8f0ff;
    --grid:9px;
  }
  html,body { height:100%; }
  body {
    background:var(--void);
    color:var(--bone);
    font-family:'Quicksand','Segoe UI',system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
    background-image:
      linear-gradient(rgba(160,64,255,0.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,64,255,0.13) 1px, transparent 1px);
    background-size:var(--grid) var(--grid);
    -webkit-font-smoothing:antialiased;
  }
  body::after{
    content:'';
    position:fixed; inset:0;
    background:radial-gradient(ellipse at 50% 30%, transparent 30%, rgba(5,0,8,0.8) 80%, var(--void) 100%);
    pointer-events:none; z-index:1;
  }
  header {
    position:relative; z-index:10;
    background:var(--bone);
    color:#140022;
    padding:18px 27px 16px;
    border-bottom:3px solid var(--purple);
    box-shadow:
      0 1px 0 #fff inset,
      0 9px 27px rgba(160,64,255,0.35),
      0 0 54px rgba(160,64,255,0.2);
  }
  header h1 {
    font-family:'Orbitron','Arial Black',Impact,Haettenschweiler,sans-serif;
    font-weight:900;
    font-size:clamp(22px,4vw,36px);
    letter-spacing:1.5px;
    line-height:1;
    color:#1f0033;
  }
  header h1 span { color:var(--purple); text-shadow:0 0 12px rgba(160,64,255,0.5); }
  header p {
    margin-top:6px;
    font-size:12px;
    letter-spacing:3.5px;
    text-transform:uppercase;
    font-weight:700;
    color:#5c2d8a;
  }
  main { position:relative; z-index:2; max-width:1500px; margin:0 auto; padding:27px 18px 0; }

  .d20-wrap {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    margin:27px 0 18px;
  }
  #d20canvas {
    width:min(88vw,380px);
    height:min(88vw,380px);
    cursor:grab;
    filter:drop-shadow(0 0 36px rgba(160,64,255,0.55)) drop-shadow(0 0 18px rgba(200,240,255,0.2));
    touch-action:none;
  }
  #d20canvas:active { cursor:grabbing; }
  .d20-label {
    margin-top:9px;
    font-family:'Orbitron','Arial Black',sans-serif;
    font-size:10px;
    letter-spacing:4px;
    color:var(--ice);
    opacity:0.75;
    text-shadow:0 0 10px var(--purple);
  }

  .grid-shell {
    display:flex; align-items:center; justify-content:center; gap:18px;
    margin:54px 0 36px;
  }
  .side-arrows {
    display:flex; flex-direction:column; gap:72px;
    font-family:'Orbitron','Arial Black',sans-serif;
    color:var(--purple-bright);
    font-size:12px; letter-spacing:2px;
    user-select:none;
  }
  .side-arrows .arrow {
    padding:12px 8px;
    border:1px solid rgba(200,240,255,0.25);
    background:linear-gradient(180deg, rgba(160,64,255,0.12), rgba(5,0,8,0.6));
    box-shadow:inset 0 0 12px rgba(160,64,255,0.15), 0 0 18px rgba(0,0,0,0.6);
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    text-align:center;
    backdrop-filter:blur(3px);
  }
  .side-arrows .arrow span { color:var(--ice); margin:4px 0; display:block; text-shadow:0 0 8px var(--ice); }
  .side-arrows.right .arrow { transform:none; }

  .cards {
    display:grid;
    grid-template-columns:repeat(auto-fill,243px);
    gap:27px;
    justify-content:center;
    width:100%;
    max-width:1180px;
  }
  .card {
    width:243px; height:243px;
    position:relative;
    perspective:1400px;
    cursor:pointer;
    isolation:isolate;
  }
  .card-inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .45s cubic-bezier(.2,.7,.2,1);
  }
  .card:hover .card-inner { transform:translateY(-9px); }
  .card:hover { filter:drop-shadow(0 12px 32px rgba(192,128,255,0.45)); }

  .tile {
    position:absolute; inset:0;
    background:
      radial-gradient(120% 100% at 50% 0%, rgba(192,128,255,0.18) 0%, transparent 60%),
      linear-gradient(160deg, #0d0018 0%, #21003c 45%, #110022 100%);
    border:1px solid rgba(200,240,255,0.55);
    border-radius:4px;
    box-shadow:
      inset 0 0 0 1px rgba(160,64,255,0.6),
      inset 0 0 36px rgba(160,64,255,0.18),
      0 0 0 1px rgba(0,0,0,0.8),
      0 9px 27px rgba(0,0,0,0.7);
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:9px;
    gap:4px;
    overflow:hidden;
  }
  .tile::before {
    content:'';
    position:absolute; inset:0;
    background:
      linear-gradient(rgba(160,64,255,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,64,255,0.18) 1px, transparent 1px);
    background-size:9px 9px;
    mix-blend-mode:screen;
    opacity:0.6;
    pointer-events:none;
  }
  .tile::after {
    content:'';
    position:absolute; inset:-1px;
    background:linear-gradient(115deg, transparent 30%, rgba(200,240,255,0.15) 50%, transparent 70%);
    opacity:0; transition:opacity .4s;
    pointer-events:none;
  }
  .card:hover .tile::after { opacity:1; }

  .cell {
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--ice);
    background:rgba(0,0,0,0.38);
    border:1px solid rgba(200,240,255,0.18);
    position:relative;
    overflow:hidden;
  }
  .cell.small { font-size:8px; opacity:0.8; }
  .center {
    grid-column:2; grid-row:2;
    background:radial-gradient(circle at 50% 40%, rgba(160,64,255,0.35) 0%, rgba(10,0,20,0.85) 65%);
    border:1px solid var(--ice);
    box-shadow:
      0 0 18px rgba(200,240,255,0.35),
      inset 0 0 18px rgba(160,64,255,0.5),
      inset 0 0 4px rgba(200,240,255,0.8);
    font-family:'Orbitron','Arial Black',sans-serif;
    font-size:56px; font-weight:900;
    color:var(--ice);
    text-shadow:0 0 8px var(--purple), 0 0 22px var(--purple-bright), 0 0 36px rgba(200,240,255,0.5);
    z-index:2;
  }
  .cell.tl{grid-column:1;grid-row:1} .cell.tm{grid-column:2;grid-row:1} .cell.tr{grid-column:3;grid-row:1}
  .cell.ml{grid-column:1;grid-row:2} .cell.mr{grid-column:3;grid-row:2}
  .cell.bl{grid-column:1;grid-row:3} .cell.bm{grid-column:2;grid-row:3} .cell.br{grid-column:3;grid-row:3}

  .layers { position:absolute; inset:0; pointer-events:none; transform-style:preserve-3d; z-index:5; }
  .layer {
    position:absolute; inset:10px;
    border:1px solid;
    border-radius:3px;
    padding:5px 7px;
    font-family:'Orbitron','Arial Black',sans-serif;
    font-size:9px; letter-spacing:1.5px;
    display:flex; align-items:flex-start; justify-content:flex-end;
    opacity:0;
    transform:translate3d(0,0,0) scale(0.96) rotateZ(0);
    transition:transform .6s cubic-bezier(.18,.8,.2,1), opacity .4s;
    backdrop-filter:blur(4px) saturate(1.2);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
  }
  .card.flayed .layer { opacity:0.94; }
  .card.flayed .layer:nth-child(1){ transform:translate3d(-14px,-14px,18px) rotateZ(-3deg); background:rgba(220,248,255,0.1); border-color:#e6faff; color:#e6faff; box-shadow:0 0 24px rgba(200,240,255,0.4); }
  .card.flayed .layer:nth-child(2){ transform:translate3d(-10px,-10px,12px) rotateZ(-2deg); background:rgba(200,240,255,0.09); border-color:var(--ice); color:var(--ice); }
  .card.flayed .layer:nth-child(3){ transform:translate3d(-6px,-6px,8px) rotateZ(-1deg); background:rgba(176,224,255,0.08); border-color:#b8e8ff; color:#b8e8ff; }
  .card.flayed .layer:nth-child(4){ transform:translate3d(0,0,4px) rotateZ(0); background:rgba(160,64,255,0.18); border-color:var(--purple); color:var(--purple-bright); box-shadow:0 0 18px rgba(160,64,255,0.5); }
  .card.flayed .layer:nth-child(5){ transform:translate3d(6px,6px,-2px) rotateZ(1deg); background:rgba(90,10,160,0.14); border-color:#7f29c7; color:#a865ff; }
  .card.flayed .layer:nth-child(6){ transform:translate3d(10px,10px,-6px) rotateZ(2deg); background:rgba(50,0,90,0.12); border-color:#5a1a8a; color:#8f42d4; }
  .card.flayed .layer:nth-child(7){ transform:translate3d(14px,14px,-10px) rotateZ(3deg); background:rgba(20,0,40,0.1); border-color:#3a0760; color:#6b22a8; }

  footer {
    position:relative; z-index:2;
    margin-top:90px;
    padding:36px 18px 54px;
    text-align:center;
    border-top:1px solid rgba(160,64,255,0.25);
    background:linear-gradient(to top, rgba(5,0,8,0.95), transparent);
  }
  footer .formula {
    font-family:'Orbitron','Arial Black',sans-serif;
    font-size:15px; letter-spacing:2.5px;
    color:var(--purple-bright);
    text-shadow:0 0 12px rgba(160,64,255,0.9), 0 0 24px rgba(160,64,255,0.5);
    margin-bottom:10px;
  }
  footer .complete {
    font-size:11px; letter-spacing:5px; text-transform:uppercase;
    color:var(--ice); opacity:0.85;
  }

  @media (max-width:980px){
    .grid-shell{ flex-direction:column; gap:27px; }
    .side-arrows{ flex-direction:row; gap:18px; }
    .side-arrows .arrow, .side-arrows.right .arrow{ writing-mode:horizontal-tb; transform:none; padding:8px 14px; }
    .side-arrows .arrow span{ display:inline; margin:0 6px; }
  }
</style>
</head>
<body>
  <header>
    <h1>d20 · <span>Twenty Faces</span> · Avan's Eye</h1>
    <p>T3 TRINTRIN · 9-PIXEL BRAIN SUBSTRATE</p>
  </header>

  <main>
    <div class="d20-wrap">
      <canvas id="d20canvas" width="380" height="380" aria-label="Rotating d20"></canvas>
      <div class="d20-label">DRAG TO SPIN · 9-PIXEL TILES</div>
    </div>

    <div class="grid-shell">
      <div class="side-arrows left">
        <div class="arrow">IN <span>→</span> OUT</div>
        <div class="arrow">IN⁻¹ <span>→</span> OUT⁻¹</div>
      </div>

      <div class="cards" id="cards"></div>

      <div class="side-arrows right">
        <div class="arrow"><span>←</span> OUT</div>
        <div class="arrow"><span>←</span> OUT⁻¹</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="formula">1 pixel = 1 + 7 cores × 6 = 42</div>
    <div class="complete">MESH BRAIN — COMPLETE</div>
  </footer>

<script>
(() => {
  const canvas = document.getElementById('d20canvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  const t = (1 + Math.sqrt(5)) / 2;
  const verts = [
    [-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],
    [0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],
    [t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]
  ].map(v => { const l = Math.hypot(v[0],v[1],v[2]); return [v[0]/l*1.15, v[1]/l*1.15, v[2]/l*1.15]; });

  const faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
  ];

  let rotX = 0.35, rotY = 0.7;
  let dragging = false, lastX = 0, lastY = 0, velX = 0, velY = 0, autoRotate = true;

  canvas.addEventListener('pointerdown', e => {
    dragging = true; autoRotate = false;
    lastX = e.clientX; lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointerup', () => { dragging = false; setTimeout(()=>autoRotate=true, 2500); });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    rotY += dx * 0.008; rotX += dy * 0.008;
    velY = dx * 0.008; velX = dy * 0.008;
    lastX = e.clientX; lastY = e.clientY;
  });

  function project(v) {
    const cx = Math.cos(rotX), sx = Math.sin(rotX);
    const cy = Math.cos(rotY), sy = Math.sin(rotY);
    let x = v[0], y = v[1], z = v[2];
    const x1 = x*cy - z*sy;
    const z1 = x*sy + z*cy;
    const y1 = y*cx - z1*sx;
    const z2 = y*sx + z1*cx;
    const dist = 3.2;
    const f = 170 / (dist + z2);
    return {x:x1*f, y:y1*f, z:z2};
  }

  function draw() {
    requestAnimationFrame(draw);
    if (autoRotate && !dragging) { rotY += 0.004; rotX += 0.0015; }
    else if (!dragging) { rotX += velX; rotY += velY; velX*=0.92; velY*=0.92; }

    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.translate(w/2, h/2);

    const pv = verts.map(project);
    const fd = faces.map((f,i) => {
      const a=pv[f[0]], b=pv[f[1]], c=pv[f[2]];
      return {i, a,b,c, z:(a.z+b.z+c.z)/3};
    }).sort((p,q)=>q.z-p.z);

    fd.forEach(({a,b,c,i}) => {
      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
      
      const grad = ctx.createLinearGradient(a.x,a.y,c.x,c.y);
      grad.addColorStop(0,'rgba(25,0,50,0.85)');
      grad.addColorStop(1,'rgba(10,0,25,0.7)');
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.save();
      ctx.shadowColor = '#c080ff';
      ctx.shadowBlur = 22;
      ctx.strokeStyle = 'rgba(192,128,255,0.95)';
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.restore();

      const cx = (a.x+b.x+c.x)/3, cy = (a.y+b.y+c.y)/3;
      
      // 9-pixel tile
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(i*0.31 + rotY);
      ctx.globalAlpha = 0.35;
      for(let py=-1; py<=1; py++){
        for(let px=-1; px<=1; px++){
          ctx.fillStyle = '#c8f0ff';
          ctx.shadowColor = '#c8f0ff';
          ctx.shadowBlur = 6;
          ctx.fillRect(px*4.5-1.5, py*4.5-1.5, 3, 3);
        }
      }
      ctx.restore();

      ctx.save();
      ctx.shadowColor = '#c8f0ff';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#c8f0ff';
      ctx.font = '700 13px "Orbitron","Arial Black",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(i+1), cx, cy+0.5);
      ctx.restore();
    });

    ctx.restore();
  }
  draw();
})();

(() => {
  const cardsEl = document.getElementById('cards');
  const layers = ['3 LIGHT','2 EGG','1 PURITY','0','1 VOID','2 SHADOW','6 SMOKE'];
  
  for(let i=1;i<=20;i++){
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="tile">
          <div class="cell tl small">L1</div>
          <div class="cell tm small">ID</div>
          <div class="cell tr small">R1</div>
          <div class="cell ml small">L2</div>
          <div class="center">${i}</div>
          <div class="cell mr small">R2</div>
          <div class="cell bl small">L3</div>
          <div class="cell bm small">SUPEREGO</div>
          <div class="cell br small">R3</div>
        </div>
        <div class="layers">${layers.map(l=>`<div class="layer">${l}</div>`).join('')}</div>
      </div>`;
    card.addEventListener('click', () => {
      const isOpen = card.classList.contains('flayed');
      document.querySelectorAll('.card.flayed').forEach(c=>{ if(c!==card) c.classList.remove('flayed'); });
      card.classList.toggle('flayed', !isOpen);
      if (navigator.vibrate) navigator.vibrate(8);
    });
    cardsEl.appendChild(card);
  }
})();
</script>
</body>
</html>
