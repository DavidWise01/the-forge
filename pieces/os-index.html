<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT0 Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --darker: #050505;
            --gray: #1a1a1a;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }
        body {
            background: var(--darker);
            color: #e5e5e5;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        .gold { color: var(--gold); }
        .bg-gold { background: var(--gold); }
        .border-gold { border-color: var(--gold); }
        .glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .card {
            background: var(--gray);
            border: 1px solid #333;
            border-radius: 8px;
        }
        .risk-high { color: var(--red); }
        .risk-medium { color: var(--yellow); }
        .risk-low { color: var(--green); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const API_BASE = 'http://localhost:5000/api';
        
        // ========== ICONS ==========
        const Icons = {
            Shield: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
            Heart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
            Sword: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Database: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4" /></svg>,
            Terminal: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Play: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
        };
        
        // ========== HEADER ==========
        function Header({ activeTab, setActiveTab }) {
            const tabs = [
                { id: 'dashboard', label: 'Dashboard', icon: Icons.Database },
                { id: 'kernel', label: 'KERNEL', icon: Icons.Shield },
                { id: 'hermes', label: 'HERMES', icon: Icons.Heart },
                { id: 'archon', label: 'ARCHON', icon: Icons.Sword },
                { id: 'tool00', label: 'TOOL_00', icon: Icons.Search },
            ];
            
            return (
                <header className="border-b border-gray-800 bg-black/50 backdrop-blur sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 py-3">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h1 className="text-2xl font-bold gold">⚙️ ROOT0</h1>
                                <span className="text-xs text-gray-500">STOICHEION v11.0 | 256 Axioms</span>
                            </div>
                            <nav className="flex gap-1">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded transition ${
                                            activeTab === tab.id 
                                                ? 'bg-gold/20 gold border border-gold/30' 
                                                : 'hover:bg-gray-800'
                                        }`}
                                    >
                                        <tab.icon />
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>
                </header>
            );
        }
        
        // ========== DASHBOARD TAB ==========
        function DashboardTab() {
            const [stats, setStats] = React.useState(null);
            const [keys, setKeys] = React.useState([]);
            const [status, setStatus] = React.useState(null);
            
            React.useEffect(() => {
                fetch(`${API_BASE}/status`).then(r => r.json()).then(setStatus).catch(() => {});
                fetch(`${API_BASE}/pool/stats`).then(r => r.json()).then(setStats).catch(() => {});
                fetch(`${API_BASE}/kernel/keys?limit=5`).then(r => r.json()).then(setKeys).catch(() => {});
            }, []);
            
            return (
                <div className="space-y-6">
                    {/* Status Bar */}
                    <div className="card p-4 border-l-4 border-gold">
                        <div className="flex items-center justify-between">
                            <div>
                                <h2 className="text-lg font-bold gold">ROOT0 System Status</h2>
                                <p className="text-sm text-gray-400">
                                    {status ? `API Online | ${status.timestamp}` : 'Connecting...'}
                                </p>
                            </div>
                            <div className="text-right">
                                <p className="text-sm">SHA256: <span className="font-mono text-xs">02880745...fcab763</span></p>
                                <p className="text-sm text-gray-400">TriPod: DLW + Sarah + Roth</p>
                            </div>
                        </div>
                    </div>
                    
                    {/* Metrics */}
                    <div className="grid grid-cols-4 gap-4">
                        {[
                            { label: 'Total Items', value: stats?.total_tools || 0 },
                            { label: 'Governance Keys', value: stats?.governance_keys || 0 },
                            { label: 'Tags', value: stats?.tags || 0 },
                            { label: 'Notes', value: stats?.notes || 0 },
                        ].map((m, i) => (
                            <div key={i} className="card p-4 text-center">
                                <p className="text-3xl font-bold gold">{m.value}</p>
                                <p className="text-sm text-gray-400">{m.label}</p>
                            </div>
                        ))}
                    </div>
                    
                    {/* Recent Keys */}
                    <div className="card p-4">
                        <h3 className="text-lg font-bold mb-4">Recent Governance Keys</h3>
                        {keys.length === 0 ? (
                            <p className="text-gray-500">No keys generated yet. Run KERNEL audit.</p>
                        ) : (
                            <div className="space-y-2">
                                {keys.map((k, i) => (
                                    <div key={i} className="flex items-center justify-between p-3 bg-black/30 rounded">
                                        <div>
                                            <span className="font-bold">{k.target}</span>
                                            <span className={`ml-4 risk-${k.risk?.toLowerCase()}`}>{k.risk}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="gold">{k.compliance?.toFixed(1)}%</span>
                                            <p className="text-xs font-mono text-gray-500">{k.key_256?.slice(0, 24)}...</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        // ========== KERNEL TAB ==========
        function KernelTab() {
            const [target, setTarget] = React.useState('');
            const [mode, setMode] = React.useState('quick');
            const [loading, setLoading] = React.useState(false);
            const [result, setResult] = React.useState(null);
            
            const runAudit = async () => {
                if (!target) return;
                setLoading(true);
                setResult(null);
                
                try {
                    const res = await fetch(`${API_BASE}/kernel/audit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target, mode })
                    });
                    const data = await res.json();
                    setResult(data);
                } catch (e) {
                    setResult({ error: e.message });
                }
                setLoading(false);
            };
            
            return (
                <div className="space-y-6">
                    <div className="card p-4">
                        <h2 className="text-xl font-bold gold mb-4">🔐 KERNEL - Governance Audit</h2>
                        <div className="flex gap-4 items-end">
                            <div className="flex-1">
                                <label className="block text-sm text-gray-400 mb-1">Target</label>
                                <input
                                    type="text"
                                    value={target}
                                    onChange={e => setTarget(e.target.value)}
                                    placeholder="google.com"
                                    className="w-full px-4 py-2 bg-black border border-gray-700 rounded focus:border-gold outline-none"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Mode</label>
                                <select 
                                    value={mode}
                                    onChange={e => setMode(e.target.value)}
                                    className="px-4 py-2 bg-black border border-gray-700 rounded"
                                >
                                    <option value="quick">Quick (Hash)</option>
                                    <option value="full">Full (Claude API)</option>
                                </select>
                            </div>
                            <button
                                onClick={runAudit}
                                disabled={loading || !target}
                                className="flex items-center gap-2 px-6 py-2 bg-gold text-black font-bold rounded hover:bg-yellow-500 disabled:opacity-50"
                            >
                                <Icons.Play />
                                {loading ? 'Running...' : 'Execute'}
                            </button>
                        </div>
                    </div>
                    
                    {result && !result.error && (
                        <div className="card p-4 glow">
                            <div className="grid grid-cols-4 gap-4 mb-6">
                                <div className="text-center">
                                    <p className="text-4xl font-bold gold">{result.compliance?.toFixed(1)}%</p>
                                    <p className="text-sm text-gray-400">Compliance</p>
                                </div>
                                <div className="text-center">
                                    <p className={`text-4xl font-bold risk-${result.risk?.toLowerCase()}`}>{result.risk}</p>
                                    <p className="text-sm text-gray-400">Risk Level</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-4xl font-bold text-green-500">{result.pass}</p>
                                    <p className="text-sm text-gray-400">PASS</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-4xl font-bold text-red-500">{result.fail}</p>
                                    <p className="text-sm text-gray-400">FAIL</p>
                                </div>
                            </div>
                            
                            <div className="bg-black p-4 rounded font-mono text-sm overflow-x-auto">
                                <p className="gold">256-BIT KEY:</p>
                                <p className="break-all">{result.key_256}</p>
                            </div>
                        </div>
                    )}
                    
                    {result?.error && (
                        <div className="card p-4 border-red-500 border">
                            <p className="text-red-500">Error: {result.error}</p>
                        </div>
                    )}
                </div>
            );
        }
        
        // ========== HERMES TAB ==========
        function HermesTab() {
            const [barriers, setBarriers] = React.useState([]);
            const [form, setForm] = React.useState({ category: 'ADA', entity: '', description: '', severity: 'MEDIUM' });
            
            const loadBarriers = () => {
                fetch(`${API_BASE}/hermes/barriers`).then(r => r.json()).then(setBarriers).catch(() => {});
            };
            
            React.useEffect(loadBarriers, []);
            
            const addBarrier = async () => {
                if (!form.entity || !form.description) return;
                await fetch(`${API_BASE}/hermes/barrier`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(form)
                });
                setForm({ ...form, entity: '', description: '' });
                loadBarriers();
            };
            
            const categories = ['ADA', 'MHRA', 'ERISA', 'ACCESS', 'BILLING', 'HIPAA', 'EMTALA'];
            const severities = ['LOW', 'MEDIUM', 'HIGH', 'CRITICAL'];
            
            return (
                <div className="space-y-6">
                    <div className="card p-4">
                        <h2 className="text-xl font-bold gold mb-4">🏥 HERMES - Healthcare Barrier Tracker</h2>
                        <div className="grid grid-cols-4 gap-4">
                            <select 
                                value={form.category}
                                onChange={e => setForm({ ...form, category: e.target.value })}
                                className="px-4 py-2 bg-black border border-gray-700 rounded"
                            >
                                {categories.map(c => <option key={c}>{c}</option>)}
                            </select>
                            <input
                                type="text"
                                value={form.entity}
                                onChange={e => setForm({ ...form, entity: e.target.value })}
                                placeholder="Entity name"
                                className="px-4 py-2 bg-black border border-gray-700 rounded"
                            />
                            <select 
                                value={form.severity}
                                onChange={e => setForm({ ...form, severity: e.target.value })}
                                className="px-4 py-2 bg-black border border-gray-700 rounded"
                            >
                                {severities.map(s => <option key={s}>{s}</option>)}
                            </select>
                            <button onClick={addBarrier} className="px-4 py-2 bg-gold text-black font-bold rounded">
                                Add Barrier
                            </button>
                        </div>
                        <textarea
                            value={form.description}
                            onChange={e => setForm({ ...form, description: e.target.value })}
                            placeholder="Describe the barrier..."
                            className="w-full mt-4 px-4 py-2 bg-black border border-gray-700 rounded h-24"
                        />
                    </div>
                    
                    <div className="card p-4">
                        <h3 className="font-bold mb-4">Barriers ({barriers.length})</h3>
                        <div className="space-y-2">
                            {barriers.map((b, i) => (
                                <div key={i} className="p-3 bg-black/30 rounded">
                                    <div className="flex justify-between">
                                        <span className="font-bold">{b.name}</span>
                                        <span className="text-sm text-gray-400">{b.type}</span>
                                    </div>
                                    <p className="text-sm text-gray-400">{b.description?.slice(0, 100)}</p>
                                </div>
                            ))}
                            {barriers.length === 0 && <p className="text-gray-500">No barriers recorded.</p>}
                        </div>
                    </div>
                </div>
            );
        }
        
        // ========== ARCHON TAB ==========
        function ArchonTab() {
            const [query, setQuery] = React.useState('');
            const [cards, setCards] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            
            const search = async () => {
                if (!query) return;
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/archon/search?q=${encodeURIComponent(query)}&limit=12`);
                    const data = await res.json();
                    setCards(data);
                } catch (e) {
                    setCards([]);
                }
                setLoading(false);
            };
            
            return (
                <div className="space-y-6">
                    <div className="card p-4">
                        <h2 className="text-xl font-bold gold mb-4">⚔️ ARCHON - MTG Commander Deck Builder</h2>
                        <div className="flex gap-4">
                            <input
                                type="text"
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && search()}
                                placeholder="Search cards... (e.g., landfall green)"
                                className="flex-1 px-4 py-2 bg-black border border-gray-700 rounded"
                            />
                            <button onClick={search} disabled={loading} className="px-6 py-2 bg-gold text-black font-bold rounded">
                                {loading ? 'Searching...' : 'Search'}
                            </button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-3 gap-4">
                        {cards.map((c, i) => (
                            <div key={i} className="card p-4">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="font-bold">{c.name}</span>
                                    <span className="text-sm gold">{c.mana_cost}</span>
                                </div>
                                <p className="text-xs text-gray-400 mb-2">{c.type_line}</p>
                                <div className="flex gap-1 flex-wrap">
                                    {c.color_identity?.map((col, j) => (
                                        <span key={j} className="px-2 py-0.5 bg-gray-800 rounded text-xs">{col}</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    {cards.length === 0 && !loading && (
                        <p className="text-center text-gray-500">Search for cards to build your deck.</p>
                    )}
                </div>
            );
        }
        
        // ========== TOOL_00 TAB ==========
        function Tool00Tab() {
            const [source, setSource] = React.useState('github');
            const [target, setTarget] = React.useState('');
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            
            const analyze = async () => {
                if (!target) return;
                setLoading(true);
                setResult(null);
                try {
                    const res = await fetch(`${API_BASE}/tool00/${source}/${target}`);
                    const data = await res.json();
                    setResult(data);
                } catch (e) {
                    setResult({ error: e.message });
                }
                setLoading(false);
            };
            
            return (
                <div className="space-y-6">
                    <div className="card p-4">
                        <h2 className="text-xl font-bold gold mb-4">🔬 TOOL_00 - Research Collector</h2>
                        <div className="flex gap-4">
                            <select 
                                value={source}
                                onChange={e => setSource(e.target.value)}
                                className="px-4 py-2 bg-black border border-gray-700 rounded"
                            >
                                <option value="github">GitHub</option>
                                <option value="pypi">PyPI</option>
                                <option value="npm">npm</option>
                            </select>
                            <input
                                type="text"
                                value={target}
                                onChange={e => setTarget(e.target.value)}
                                placeholder={source === 'github' ? 'owner/repo' : 'package-name'}
                                className="flex-1 px-4 py-2 bg-black border border-gray-700 rounded"
                            />
                            <button onClick={analyze} disabled={loading} className="px-6 py-2 bg-gold text-black font-bold rounded">
                                {loading ? 'Analyzing...' : 'Analyze'}
                            </button>
                        </div>
                    </div>
                    
                    {result && !result.error && (
                        <div className="card p-4">
                            <h3 className="font-bold gold mb-2">{result.name}</h3>
                            <p className="text-sm text-gray-400 mb-4">{result.description || result.summary}</p>
                            <div className="grid grid-cols-3 gap-4 text-sm">
                                {result.language && <div><span className="text-gray-500">Language:</span> {result.language}</div>}
                                {result.stars && <div><span className="text-gray-500">Stars:</span> {result.stars}</div>}
                                {result.version && <div><span className="text-gray-500">Version:</span> {result.version}</div>}
                                {result.license && <div><span className="text-gray-500">License:</span> {result.license}</div>}
                            </div>
                            {result.url && (
                                <a href={result.url} target="_blank" className="inline-block mt-4 text-gold underline">
                                    View Source →
                                </a>
                            )}
                        </div>
                    )}
                </div>
            );
        }
        
        // ========== MAIN APP ==========
        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            
            const renderTab = () => {
                switch (activeTab) {
                    case 'kernel': return <KernelTab />;
                    case 'hermes': return <HermesTab />;
                    case 'archon': return <ArchonTab />;
                    case 'tool00': return <Tool00Tab />;
                    default: return <DashboardTab />;
                }
            };
            
            return (
                <div className="min-h-screen">
                    <Header activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {renderTab()}
                    </main>
                    <footer className="border-t border-gray-800 py-4 mt-8">
                        <div className="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
                            ROOT0: David Lee Wise | TriPod: DLW + Sarah + Roth | 4th Point: Ann | 
                            STOICHEION v11.0 | CC-BY-ND-4.0
                        </div>
                    </footer>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
