    <div class="absolute bottom-[14%] sm:bottom-[16%] left-1/2 -translate-x-1/2 w-full max-w-[90vw] flex flex-col items-center gap-2.5 text-center">
      <div id="formula" class="font-['JetBrains_Mono'] font-light tracking-[0.18em] text-black/60" style="font-size: clamp(0.8rem, 1.6vw, 1.05rem); opacity: 0; transition: opacity 0.7s ease;">2/5 + 3/5 = 5/5 = 1</div>
      <div id="delta" class="font-['JetBrains_Mono'] font-light tracking-[0.35em] text-black/50" style="font-size: clamp(0.7rem, 1.3vw, 0.9rem); opacity: 0; transition: opacity 0.7s ease 0.1s;">-211 Δ</div>
      <div id="pulse" class="flex items-center justify-center gap-3 sm:gap-5 mt-2 font-['JetBrains_Mono'] font-extralight text-black/45" style="font-size: clamp(1.1rem, 2.2vw, 1.5rem); opacity: 0; transition: opacity 0.6s ease;">
        <span class="pulse-dot">.</span>
        <span class="pulse-dot">..</span>
        <span class="pulse-dot">...</span>
        <span class="pulse-dot">...</span>
        <span class="pulse-dot">..</span>
        <span class="pulse-dot">.</span>
      </div>
    </div>

    <!-- Start prompt (shows only if autoplay blocked) -->
    <button id="startBtn" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 px-7 py-3 rounded-full border border-black/15 bg-[#f5f1e6]/70 backdrop-blur-md font-medium tracking-[0.2em] text-[11px] text-black/70 hover:bg-black/5 hover:text-black/90 transition">BEGIN SEQUENCE</button>

    <!-- subtle vignette -->
    <div class="pointer-events-none absolute inset-0" style="background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.03) 100%);"></div>
  </main>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function runSequence() {
  const number = document.getElementById('number');
  const equals = document.getElementById('equals');
  const ignition = document.getElementById('ignition');
  const formula = document.getElementById('formula');
  const delta = document.getElementById('delta');
  const pulse = document.getElementById('pulse');
  const pulseDots = [...pulse.children];
  const breath = document.getElementById('breath');
  const body = document.body;

  const down = ['555','444','333','222','111'];
  const up = ['111','222','333','444','555'];

  while (true) {
    // reset
    body.style.backgroundColor = '#f5f1e6';
    number.style.fontWeight = '200';
    number.style.opacity = '1';
    number.style.transform = 'scale(1)';
    number.style.letterSpacing = '0.18em';
    equals.style.opacity = '0';
    equals.style.transform = 'translate(-20px, -50%)';
    ignition.style.opacity = '0';
    ignition.style.transform = 'translateY(18px)';
    formula.style.opacity = '0';
    delta.style.opacity = '0';
    pulse.style.opacity = '0';
    pulseDots.forEach(d => { d.style.opacity = '0.3'; d.style.transform = 'translateY(0)'; });

    // breathing audio sync
    try { breath.currentTime = 0; breath.play().catch(()=>{}); } catch(e) {}

    // COUNT DOWN 555 → 111
    for (let i = 0; i < down.length; i++) {
      number.textContent = down[i];
      number.style.opacity = '1';
      number.style.transform = 'scale(1)';
      await sleep(950);
      number.style.opacity = '0.82';
      number.style.transform = 'scale(0.97)';
      await sleep(50);
    }

    // ZERO + FLASH
    number.textContent = '0';
    number.style.fontWeight = '100';
    number.style.letterSpacing = '0.12em';
    number.style.opacity = '1';
    number.style.transform = 'scale(1.38)';
    
    // flash to white
    body.style.backgroundColor = '#ffffff';
    await sleep(180);
    
    equals.style.opacity = '1';
    equals.style.transform = 'translate(0, -50%)';
    ignition.style.opacity = '1';
    ignition.style.transform = 'translateY(0)';

    await sleep(1100);

    // reveal formula
    formula.style.opacity = '1';
    await sleep(600);
    delta.style.opacity = '1';
    await sleep(450);

    // pulse
    pulse.style.opacity = '1';
    for (let i = 0; i < pulseDots.length; i++) {
      pulseDots[i].style.opacity = '1';
      pulseDots[i].style.transform = 'translateY(-5px)';
      await sleep(150);
      pulseDots[i].style.transform = 'translateY(0)';
      await sleep(50);
    }
    for (let i = pulseDots.length - 1; i >= 0; i--) {
      pulseDots[i].style.opacity = '0.38';
      await sleep(90);
    }

    await sleep(300);

    // return to cream while counting up
    body.style.backgroundColor = '#f5f1e6';
    equals.style.opacity = '0';
    equals.style.transform = 'translate(-12px, -50%)';

    // COUNT UP 111 → 555
    for (let i = 0; i < up.length; i++) {
      number.textContent = up[i];
      number.style.fontWeight = '200';
      number.style.letterSpacing = '0.18em';
      number.style.transform = 'scale(1)';
      number.style.opacity = '1';
      await sleep(800);
      number.style.opacity = '0.75';
      await sleep(120);
    }

    // hold and fade
    await sleep(350);
    ignition.style.opacity = '0';
    formula.style.opacity = '0';
    delta.style.opacity = '0';
    pulse.style.opacity = '0';
    number.style.opacity = '0';
    number.style.transform = 'scale(0.96)';

    await sleep(650);
    // loop ~15s total
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const dance = document.getElementById('dance');
  const breath = document.getElementById('breath');
  const startBtn = document.getElementById('startBtn');
  
  dance.volume = 0.22;
  breath.volume = 0.55;

  const tryAutoplay = async () => {
    try {
      await dance.play();
      startBtn.classList.add('hidden');
    } catch {
      startBtn.classList.remove('hidden');
    }
  };

  startBtn.addEventListener('click', async () => {
    try {
      await dance.play();
      await breath.play();
      breath.pause();
      breath.currentTime = 0;
    } catch(e) {}
    startBtn.classList.add('hidden');
  }, { once: true });

  runSequence();
  tryAutoplay();

  // allow spacebar to toggle sound
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (dance.paused) dance.play().catch(()=>{}); else dance.pause();
    }
  });
});
</script>
</body>
</html>
