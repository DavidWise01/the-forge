<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEST 3 DEEP // 1000×4+1 ×1000 = ∞</title>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; height:100%; background:#000; overflow:hidden; font-family:'JetBrains Mono', monospace; }
  canvas { display:block; }
  .glow { text-shadow: 0 0 20px rgba(168,85,247,0.8), 0 0 40px rgba(168,85,247,0.4); }
  .ui-panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
</style>
</head>
<body class="bg-black text-zinc-200">
<canvas id="c" class="fixed inset-0"></canvas>

<!-- Top UI -->
<div class="fixed top-0 left-0 w-full p-4 md:p-6 pointer-events-none z-10">
  <div class="flex justify-between items-start">
    <div class="ui-panel bg-black/40 rounded-2xl px-5 py-3 border border-purple-900/30">
      <h1 class="font-['Space_Grotesk'] text-purple-400 glow text-[18px] md:text-[24px] tracking-widest font-bold">NEST 3 DEEP</h1>
      <div class="flex items-center gap-3 mt-1">
        <span class="text-[11px] text-zinc-500 tracking-[0.2em]">1000×4+1 ×1000 = ∞</span>
        <span class="text-[10px] px-2 py-0.5 rounded bg-purple-950/60 text-purple-300 border border-purple-800/40">0root.ai/nest</span>
      </div>
    </div>
    <div class="ui-panel bg-black/40 rounded-2xl px-4 py-3 border border-purple-900/30 text-right">
      <div class="text-[11px] text-zinc-500">NEST DEPTH</div>
      <div class="text-2xl font-bold text-purple-300 -mt-1">3</div>
      <div class="text-[10px] mt-1 text-purple-400/80">REPEATS TO INF: <span id="inf" class="text-white">0</span></div>
    </div>
  </div>
</div>

<!-- Bottom UI -->
<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-10">
  <div class="ui-panel bg-black/60 rounded-2xl px-5 py-4 border border-purple-950/50 max-w-5xl">
    <div class="flex flex-wrap items-baseline gap-x-8 gap-y-2 font-mono">
      <div class="text-zinc-400 text-sm">LAYER: <span id="layer" class="text-[22px] font-bold text-white glow ml-1">0</span></div>
      <div class="text-zinc-400 text-sm">VOXEL <span id="voxel" class="text-white text-[18px] ml-1">000</span><span class="text-zinc-600">/1000</span></div>
      <div class="text-zinc-400 text-sm">PHASE <span id="phase" class="text-cyan-300 text-[18px] ml-1">1</span><span class="text-zinc-600">/27</span></div>
      <div class="ml-auto hidden md:flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
        <span class="text-[11px] text-zinc-500 tracking-widest">PHOTON ACTIVE</span>
      </div>
    <div class="mt-3 pt-3 border-t border-zinc-800/60 flex flex-wrap gap-x-6 text-[11px] font-mono">
      <span class="text-zinc-500">TOTAL STATES:</span>
      <span class="text-zinc-300">5,000 <span class="text-zinc-600">×</span> 5,000 <span class="text-zinc-600">×</span> 5,000 <span class="text-zinc-600">=</span> <span class="text-purple-300">125,000,000,000</span></span>
    </div>
    <div class="mt-2 text-[10px] text-zinc-600 tracking-wide">[WASD] fly • [Q/E] layer • [SPACE] accelerate • drag to orbit</div>
  </div>
</div>

<!-- Center hint -->
<div id="hint" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-20 transition-opacity duration-1000">
  <div class="ui-panel bg-purple-950/20 border border-purple-500/30 rounded-full px-6 py-2">
    <p class="text-purple-300 text-xs tracking-[0.3em]">ENTERING LAYER 0</p>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x000000, 0.0012);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 8000);
camera.position.set(0, 4, 18);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 2000;

// Stars
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount*3);
for(let i=0;i<starCount*3;i+=3){
  const r = 2000 * Math.cbrt(Math.random());
  const t = Math.random()*Math.PI*2;
  const p = Math.acos(2*Math.random()-1);
  starPos[i] = r*Math.sin(p)*Math.cos(t);
  starPos[i+1] = r*Math.sin(p)*Math.sin(t);
  starPos[i+2] = r*Math.cos(p);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0x6b46c1, size:1.2, transparent:true, opacity:0.6 }));
scene.add(stars);

// Lattice creator
function createLattice(count, spacing, boxSize, color, opacity) {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
  const mat = new THREE.MeshBasicMaterial({ color, wireframe:true, transparent:true, opacity });
  const inst = new THREE.InstancedMesh(geo, mat, count*count*count);
  const dummy = new THREE.Object3D();
  const offset = (count-1)*spacing*0.5;
  let i=0;
  for(let x=0;x<count;x++){
    for(let y=0;y<count;y++){
      for(let z=0;z<count;z++){
        dummy.position.set(x*spacing - offset, y*spacing - offset, z*spacing - offset);
        dummy.updateMatrix();
        inst.setMatrixAt(i++, dummy.matrix);
      }
    }
  }
  group.add(inst);
  group.userData = { count, spacing, offset };
  return group;
}

const layer2 = createLattice(10, 140, 110, 0x3b0764, 0.055);
const layer1 = createLattice(10, 14, 11, 0x7e22ce, 0.13);
const layer0 = createLattice(10, 1.4, 1.05, 0xc084fc, 0.28);

scene.add(layer2);
layer2.add(layer1);
layer1.add(layer0);

layer1.scale.set(0.85,0.85);
layer0.scale.set(0.78,0.78);

function getVoxelPos(group, idx){
  const {count, spacing, offset} = group.userData;
  const x = Math.floor(idx / (count*count));
  const y = Math.floor((idx % (count*count)) / count);
  const z = idx % count;
  return new THREE.Vector3(x*spacing - offset, y*spacing - offset, z*spacing - offset);
}

let idx2 = 455, idx1 = 455, idx0 = 0;
layer1.position.copy(getVoxelPos(layer2, idx2));
layer0.position.copy(getVoxelPos(layer1, idx1));

// Photon
const photonGeo = new THREE.SphereGeometry(0.18, 24, 24);
const photonMat = new THREE.MeshBasicMaterial({ color:0xffffff });
const photon = new THREE.Mesh(photonGeo, photonMat);
const photonGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  color:0xffffff, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending
}));
photonGlow.scale.setScalar(1.5);
photon.add(photonGlow);
layer0.add(photon);
photon.position.copy(getVoxelPos(layer0, idx0));

const photonLight = new THREE.PointLight(0xa855f7, 3, 20);
photon.add(photonLight);

// Observers (4 per voxel)
const observers = new THREE.Group();
layer0.add(observers);
const obsMat = new THREE.MeshBasicMaterial({ color:0x22d3ee, transparent:true, opacity:0.9 });
for(let i=0;i<4;i++){
  const o = new THREE.Mesh(new THREE.SphereGeometry(0.07,12,12), obsMat.clone());
  o.userData.phase = i*Math.PI/2;
  observers.add(o);
}
const obsOffsets = [
  new THREE.Vector3(-0.45,-0.45),
  new THREE.Vector3(0.45,0.45,-0.45),
  new THREE.Vector3(-0.45,0.45,0.45),
  new THREE.Vector3(0.45,-0.45,0.45),
];
function updateObservers(){
  observers.children.forEach((o,i)=>{
    o.position.copy(photon.position).add(obsOffsets[i]);
  });
}
updateObservers();

// Trail
const trailMat = new THREE.LineBasicMaterial({ color:0xa855f7, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending });
const trailGeo = new THREE.BufferGeometry();
const maxTrail = 3000;
const trailArr = new Float32Array(maxTrail*3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailArr,3));
const trail = new THREE.Line(trailGeo, trailMat);
scene.add(trail);
let trailIdx = 0;
const tmpVec = new THREE.Vector3();
const lastTrail = new THREE.Vector3(9999,9999,9999);

// Camera targets
let currentLayerView = 0;
const desiredTarget = new THREE.Vector3();
const desiredCamPos = new THREE.Vector3();
let stepCount = 0;
let infCount = 0;

function focusLayer(n, instant=false){
  currentLayerView = n;
  const targetWorld = new THREE.Vector3();
  let dist;
  if(n===0){
    layer0.getWorldPosition(targetWorld);
    dist = 16;
    document.getElementById('hint').innerHTML = '<div class="ui-panel bg-purple-950/20 border border-purple-500/30 rounded-full px-6 py-2"><p class="text-purple-300 text-xs tracking-[0.3em]">LAYER 0 • DETAIL</p></div>';
  } else if(n===1){
    layer1.getWorldPosition(targetWorld);
    dist = 140;
    document.getElementById('hint').innerHTML = '<div class="ui-panel bg-violet-950/20 border border-violet-500/30 rounded-full px-6 py-2"><p class="text-violet-300 text-xs tracking-[0.3em]">LAYER 1 • CONTAINER</p></div>';
  } else {
    layer2.getWorldPosition(targetWorld);
    dist = 1100;
    document.getElementById('hint').innerHTML = '<div class="ui-panel bg-fuchsia-950/20 border border-fuchsia-500/30 rounded-full px-6 py-2"><p class="text-fuchsia-300 text-xs tracking-[0.3em]">LAYER 2 • META</p></div>';
  }
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  if(dir.lengthSq()<0.01) dir.set(0.3,0.4,1);
  desiredTarget.copy(targetWorld);
  desiredCamPos.copy(targetWorld).addScaledVector(dir, dist);
  
  document.getElementById('hint').style.opacity = '1';
  setTimeout(()=>document.getElementById('hint').style.opacity='0', 1200);
  
  layer0.children[0].material.opacity = n===0?0.32:0.12;
  layer1.children[0].material.opacity = n===1?0.22:n===0?0.13:0.07;
  layer2.children[0].material.opacity = n===2?0.12:0.05;
  
  if(instant){
    camera.position.copy(desiredCamPos);
    controls.target.copy(desiredTarget);
  }
  updateUI();
}
focusLayer(0, true);

function createBoom(pos, color, scale=1){
  const geo = new THREE.IcosahedronGeometry(0.5,1);
  const mat = new THREE.MeshBasicMaterial({ color, wireframe:true, transparent:true, opacity:0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  let t=0;
  const anim=()=>{
    t+=0.016;
    const s = scale * (1 + t*25);
    mesh.scale.setScalar(s);
    mat.opacity = Math.max(0, 0.9 - t*1.5);
    mesh.rotation.x += 0.05;
    mesh.rotation.y += 0.07;
    if(mat.opacity>0) requestAnimationFrame(anim); else scene.remove(mesh);
  };
  anim();
}

function stepPhoton(adv=1){
  for(let a=0;a<adv;a++){
    idx0 = (idx0 + 1) % 1000;
    photon.position.copy(getVoxelPos(layer0, idx0));
    updateObservers();
    stepCount++;
    if(idx0===0){
      completeLayer0();
    }
  }
  updateUI();
}

function completeLayer0(){
  const wp = new THREE.Vector3();
  photon.getWorldPosition(wp);
  createBoom(wp, 0xc084fc, 0.3);
  
  idx1 = (idx1 + 1) % 1000;
  layer0.position.copy(getVoxelPos(layer1, idx1));
  
  if(idx1===0){
    completeLayer1();
  } else {
    focusLayer(1);
    setTimeout(()=>focusLayer(0), 900);
  }
}

function completeLayer1(){
  const wp = new THREE.Vector3();
  layer0.getWorldPosition(wp);
  createBoom(wp, 0x9333ea, 1.2);
  
  idx2 = (idx2 + 1) % 1000;
  layer1.position.copy(getVoxelPos(layer2, idx2));
  layer0.position.copy(getVoxelPos(layer1, 0));
  idx1 = 0;
  
  if(idx2===0){
    completeLayer2();
  } else {
    focusLayer(2);
    setTimeout(()=>focusLayer(1), 1000);
    setTimeout(()=>focusLayer(0), 1800);
  }
}

function completeLayer2(){
  const wp = new THREE.Vector3();
  layer1.getWorldPosition(wp);
  createBoom(wp, 0x6b21a8, 5);
  infCount++;
  idx2 = idx1 = idx0 = 455;
  layer1.position.copy(getVoxelPos(layer2, idx2));
  layer0.position.copy(getVoxelPos(layer1, idx1));
  photon.position.copy(getVoxelPos(layer0, idx0));
  updateObservers();
  focusLayer(2);
  setTimeout(()=>focusLayer(0), 1500);
}

function updateUI(){
  document.getElementById('layer').textContent = currentLayerView;
  const v = currentLayerView===0?idx0:currentLayerView===1?idx1:idx2;
  document.getElementById('voxel').textContent = String(v).padStart(3,'0');
  document.getElementById('phase').textContent = (stepCount % 27) + 1;
  document.getElementById('inf').textContent = infCount;
}

// Input
const keys = {};
addEventListener('keydown', e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.code==='Space'){
    e.preventDefault();
    stepPhoton(12);
    // visual pulse
    photonGlow.material.opacity = 1;
    setTimeout(()=>photonGlow.material.opacity=0.8, 200);
  }
  if(e.key==='q' || e.key==='Q'){ focusLayer(Math.max(0, currentLayerView-1)); }
  if(e.key==='e' || e.key==='E'){ focusLayer(Math.min(2, currentLayerView+1)); }
});
addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

// Auto walk
let autoTimer = setInterval(()=>stepPhoton(1), 110);

// Animation
let tPrev = performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt = (now - tPrev)/1000;
  tPrev = now;
  
  // WASD fly
  const move = 12*dt;
  if(keys['w']){ camera.translateZ(-move); controls.target.z -= move*Math.cos(camera.rotation.y); controls.target.x -= move*Math.sin(camera.rotation.y); }
  if(keys['s']){ camera.translateZ(move); controls.target.z += move*Math.cos(camera.rotation.y); controls.target.x += move*Math.sin(camera.rotation.y); }
  if(keys['a']){ camera.translateX(-move); controls.target.x -= move*Math.cos(camera.rotation.y); controls.target.z += move*Math.sin(camera.rotation.y); }
  if(keys['d']){ camera.translateX(move); controls.target.x += move*Math.cos(camera.rotation.y); controls.target.z -= move*Math.sin(camera.rotation.y); }
  
  controls.update();
  camera.position.lerp(desiredCamPos, 0.04);
  controls.target.lerp(desiredTarget, 0.04);
  
  // pulse observers
  const tt = now*0.003;
  observers.children.forEach((o,i)=>{
    const s = 1 + 0.25*Math.sin(tt*2 + o.userData.phase);
    o.scale.setScalar(s);
    o.material.opacity = 0.6 + 0.4*Math.sin(tt*3 + i);
  });
  photon.rotation.y += 0.02;
  photonGlow.material.rotation = -photon.rotation.y;
  
  // trail
  photon.getWorldPosition(tmpVec);
  if(tmpVec.distanceTo(lastTrail) > 0.3){
    trailArr[trailIdx*3] = tmpVec.x;
    trailArr[trailIdx*3+1] = tmpVec.y;
    trailArr[trailIdx*3+2] = tmpVec.z;
    trailIdx = (trailIdx+1) % maxTrail;
    trail.geometry.attributes.position.needsUpdate = true;
    trail.geometry.setDrawRange(0, Math.min(trailIdx+1, maxTrail));
    lastTrail.copy(tmpVec);
  }
  
  stars.rotation.y += 0.0001;
  
  renderer.render(scene, camera);
}
animate(performance.now());

// Resize
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Initial hint fade
setTimeout(()=>document.getElementById('hint').style.opacity='0', 2000);

// Click to focus layers
renderer.domElement.addEventListener('dblclick', ()=>{
  focusLayer((currentLayerView+1)%3);
});
</script>
</body>
</html>
