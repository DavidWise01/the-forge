<body class="overflow-hidden select-none">
<div class="relative w-screen h-screen bg-black">
  <canvas id="field" class="absolute inset-0 w-full h-full" width="1862" height="1163" style="width: 1164px; height: 727px;"></canvas>
  
  <!-- UI Overlay -->
  <div class="relative z-10 w-full h-full pointer-events-none">
    
    <!-- Top Bar -->
    <div class="absolute top-4 sm:top-6 left-4 right-4 flex justify-between items-start gap-4">
      <div class="glass rounded-2xl p-4 sm:p-5 w-[170px] sm:w-[240px] pointer-events-auto">
        <div class="mono text-[10px] tracking-[0.18em] text-white/50 mb-3">UNITY DECOMPOSITION</div>
        <div id="steps" class="space-y-2.5">
          <div data-step="5" class="flex justify-between items-center transition-opacity duration-700 opacity-30">
            <span class="text-[13px] text-white/80">×5 Pentagon</span>
            <span class="mono text-[12px] text-white/60">5</span>
          </div>
          <div data-step="4" class="flex justify-between items-center transition-opacity duration-700 opacity-30">
            <span class="text-[13px] text-white/80">×4 Quadrants</span>
            <span class="mono text-[12px] text-white/60">20</span>
          </div>
          <div data-step="3" class="flex justify-between items-center transition-opacity duration-700 opacity-30">
            <span class="text-[13px] text-white/80">×3 Scales</span>
            <span class="mono text-[11px] text-white/50">1 / 0.01 / 0.001</span>
          </div>
          <div data-step="4096" class="flex justify-between items-center transition-opacity duration-700 opacity-30 pt-2 border-t border-white/10">
            <span class="text-[13px] text-white/90">×4096 Base</span>
            <span class="mono text-[12px] text-white">245,760</span>
          </div>
        </div>
      </div>

      <button id="collapseBtn" class="hidden pointer-events-auto glass rounded-full px-4 sm:px-5 py-2.5 mono text-[11px] tracking-widest hover:bg-white/10 transition">
        COLLAPSE TO 1
      </button>
    </div>

    <!-- Center -->
    <div class="absolute inset-0 flex flex-col items-center justify-center">
      <div id="unity" class="relative pointer-events-auto cursor-pointer group transform transition-all duration-700">
        <div class="w-[10px] h-[10px] sm:w-[12px] sm:h-[12px] rounded-full bg-white glow-point pulse group-hover:scale-[2.5] transition-transform duration-500"></div>
        <div class="absolute -top-9 left-1/2 -translate-x-1/2 mono text-[22px] font-light tracking-wider">1</div>
        <div class="absolute top-6 left-1/2 -translate-x-1/2 whitespace-nowrap mono text-[10px] tracking-[0.2em] text-white/40 opacity-0 group-hover:opacity-100 transition">CLICK TO EXPAND</div>
      </div>
      <div id="status" class="mt-28 sm:mt-32 mono text-[11px] sm:text-xs tracking-[0.25em] text-white/55 h-4 text-center"></div>
    </div>

    <!-- Right Wave Panel -->
    <div class="hidden lg:block absolute right-6 top-1/2 -translate-y-1/2 glass rounded-2xl p-4 w-[200px] pointer-events-none">
      <div class="mono text-[10px] tracking-widest text-white/45 mb-2.5">WAVE CYCLE</div>
      <div id="waveSteps" class="flex justify-between mono text-[13px]">
        <span class="transition-opacity">.001</span>
        <span class="transition-opacity opacity-40">.01</span>
        <span class="transition-opacity opacity-40">1</span>
        <span class="transition-opacity opacity-40">0</span>
        <span class="transition-opacity opacity-40">-1</span>
      </div>
      <div class="mt-3 h-[2px] w-full bg-white/10 rounded overflow-hidden">
        <div id="waveProgress" class="h-full w-0 bg-gradient-to-r from-violet-400 to-cyan-300 transition-all duration-100"></div>
      </div>
      <div class="mt-3 mono text-[10px] text-white/35">Plasma 1.356 – 29.175 MHz</div>
    </div>

    <!-- Bottom Equation -->
    <div class="absolute bottom-5 sm:bottom-8 left-1/2 -translate-x-1/2 pointer-events-none">
      <div class="glass rounded-full px-5 sm:px-7 py-3 sm:py-3.5">
        <div class="mono text-[12px] sm:text-[14px] tracking-wide whitespace-nowrap text-white/80">
          4096 × 3 × 4 × 5 × 1 = <span class="text-white">245,760</span> = 1
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d', { alpha: true });
  const unityEl = document.getElementById('unity');
  const statusEl = document.getElementById('status');
  const collapseBtn = document.getElementById('collapseBtn');
  const steps = document.querySelectorAll('#steps [data-step]');
  const waveSteps = document.querySelectorAll('#waveSteps span');
  const waveProgress = document.getElementById('waveProgress');

  let dpr = 1, W = 0, H = 0, CX = 0, CY = 0;
  let mode = 'unity'; // unity | expanding | active | collapsing
  let startTime = 0, collapseStart = 0;
  const ANIM_DURATION = 5000;
  const COLLAPSE_DURATION = 1400;

  let particles = [];
  let pentagon = [];
  let PARTICLE_COUNT = 0;
  let shellRadii = [0,0,0];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);
    PARTICLE_COUNT = W < 768 ? 4800 : 9000;
    if (mode !== 'unity') initParticles();
  }
  window.addEventListener('resize', resize);
  resize();

  function ease(t){ return t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  function initParticles(){
    particles = [];
    pentagon = [];
    const base = Math.min(W, H) * 0.23;
    const r5 = base * 0.38;
    const r4 = base * 0.14;
    shellRadii = [base*0.68, base*1.04, base*1.4];

    // pentagon vertices
    for(let p=0;p<5;p++){
      const a = (p/5)*Math.PI*2 - Math.PI/2;
      pentagon.push({x: CX + Math.cos(a)*r5, y: CY + Math.sin(a)*r5, a});
    }

    const groups = 60; // 5*4*3
    const perGroup = Math.floor(PARTICLE_COUNT / groups);

    for(let i=0;i<PARTICLE_COUNT;i++){
      const g = Math.floor(i / perGroup);
      const p = Math.floor(g / 12); // 0-4
      const rem = g % 12;
      const q = Math.floor(rem / 3); // 0-3
      const s = rem % 3; // 0-2

      const vert = pentagon[p];
      const x5 = vert.x;
      const y5 = vert.y;

      const qa = vert.a + (q - 1.5) * 0.32;
      const x4 = x5 + Math.cos(qa) * r4;
      const y4 = y5 + Math.sin(qa) * r4;

      const dir = Math.atan2(y4 - CY, x4 - CX);
      const sr = shellRadii[s];
      const x3 = CX + Math.cos(dir) * sr * 0.72;
      const y3 = CY + Math.sin(dir) * sr * 0.72;

      const sectorAngle = (p*4 + q) * (Math.PI*2/20);
      const jitterA = sectorAngle + (Math.random()-0.5)*0.18;
      const jitterR = sr + (Math.random()-0.5)* (base*0.18);
      const xf = CX + Math.cos(jitterA) * jitterR;
      const yf = CY + Math.sin(jitterA) * jitterR;

      const hue = 260 - (g/59)*240; // 260 violet -> 20 red
      const freq = 1.356 * Math.pow(29.175/1.356, g/59);

      particles.push({ x5, y5, x4, y4, x3, y3, xf, yf, hue, freq, s, g, size: 0.7 + Math.random()*1.1 });
    }
  }

  function startExpand(){
    if(mode !== 'unity') return;
    mode = 'expanding';
    startTime = performance.now();
    unityEl.classList.add('opacity-0','scale-0','pointer-events-none');
    statusEl.textContent = 'EXPANDING';
    initParticles();
    setTimeout(()=> collapseBtn.classList.remove('hidden'), ANIM_DURATION - 400);
  }
  unityEl.addEventListener('click', startExpand);
  unityEl.addEventListener('touchstart', startExpand, {passive:true});

  collapseBtn.addEventListener('click', ()=>{
    if(mode !== 'active') return;
    mode = 'collapsing';
    collapseStart = performance.now();
    statusEl.textContent = 'COLLAPSING TO UNITY';
    collapseBtn.classList.add('hidden');
  });

  function updateSteps(prog){
    steps[0].style.opacity = prog > 0.08 ? '1' : '0.3';
    steps[1].style.opacity = prog > 0.26 ? '1' : '0.3';
    steps[2].style.opacity = prog > 0.48 ? '1' : '0.3';
    steps[3].style.opacity = prog > 0.72 ? '1' : '0.3';
  }

  function drawSystem(prog, now){
    ctx.clearRect(0,0,W,H);
    if(prog <= 0) return;

    const pulse = 0.85 + 0.15 * Math.sin(now * 0.0028);
    
    // pentagon
    if(prog > 0.06){
      const a = Math.min(1, (prog-0.06)/0.22);
      ctx.save();
      ctx.globalAlpha = 0.18 * a;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      pentagon.forEach((v,i)=>{
        const x = CX + (v.x - CX) * a;
        const y = CY + (v.y - CY) * a;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.closePath();
      ctx.stroke();
      // vertices
      ctx.globalAlpha = 0.35 * a;
      ctx.fillStyle = '#fff';
      pentagon.forEach(v=>{
        const x = CX + (v.x - CX) * a;
        const y = CY + (v.y - CY) * a;
        ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();
    }

    // shells
    if(prog > 0.44){
      const a = Math.min(1,(prog-0.44)/0.3);
      ctx.save();
      ctx.globalAlpha = 0.08 * a;
      ctx.strokeStyle = '#9ecbff';
      ctx.lineWidth = 1;
      shellRadii.forEach((r,i)=>{
        const labels = ['1','0.01','0.001'];
        ctx.beginPath(); ctx.arc(CX,CY, r*a,0,Math.PI*2); ctx.stroke();
        if(a>0.6){
          ctx.globalAlpha = 0.25*a;
          ctx.font = '11px IBM Plex Mono';
          ctx.fillStyle = '#8fb7ff';
          ctx.textAlign = 'center';
          ctx.fillText(labels[i], CX + r*a + 18, CY+3);
          ctx.globalAlpha = 0.08 * a;
        }
      });
      ctx.restore();
    }

    // particles
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const drawProgress = prog;
    for(let i=0;i<particles.length;i++){
      const pt = particles[i];
      let x,y,local,fromX,fromY,toX,toY;
      if(drawProgress < 0.24){
        local = ease(drawProgress/0.24); fromX=CX; fromY=CY; toX=pt.x5; toY=pt.y5;
      } else if(drawProgress < 0.48){
        local = ease((drawProgress-0.24)/0.24); fromX=pt.x5; fromY=pt.y5; toX=pt.x4; toY=pt.y4;
      } else if(drawProgress < 0.72){
        local = ease((drawProgress-0.48)/0.24); fromX=pt.x4; fromY=pt.y4; toX=pt.x3; toY=pt.y3;
      } else {
        local = ease(Math.min(1,(drawProgress-0.72)/0.28)); fromX=pt.x3; fromY=pt.y3; toX=pt.xf; toY=pt.yf;
      }
      x = fromX + (toX - fromX) * local;
      y = fromY + (toY - fromY) * local;

      const alpha = (drawProgress < 0.6 ? 0.25 + drawProgress*0.6 : 0.7) * pulse;
      ctx.fillStyle = `hsla(${pt.hue}, 85%, ${62 + pt.s*4}%, ${alpha})`;
      const sz = pt.size * (0.8 + pulse*0.3) * (drawProgress>0.7?1:0.7);
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawWave(now){
    const cycle = 5200;
    const t = (now % cycle) / cycle;
    const maxR = Math.min(W,H) * 0.46;
    const r = t * maxR;
    
    ctx.save();
    ctx.translate(CX, CY);
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(160,200,255,${0.35*(1-t)})`;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(120,170,255,0.5)';
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;

    const labels = ['.001','.01','1','0','-1'];
    const idx = Math.min(4, Math.floor(t * 5));
    ctx.globalAlpha = 0.9 * (1 - t*0.5);
    ctx.fillStyle = '#cfe4ff';
    ctx.font = '12px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText(labels[idx], 0, -r - 10);
    ctx.restore();

    waveSteps.forEach((el,i)=>{ el.style.opacity = i===idx ? '1' : '0.35'; });
    waveProgress.style.width = `${t*100}%`;
  }

  function animate(now){
    requestAnimationFrame(animate);
    
    if(mode === 'expanding'){
      const elapsed = now - startTime;
      const prog = Math.min(1, elapsed / ANIM_DURATION);
      updateSteps(prog);
      drawSystem(prog, now);
      if(prog >= 1){
        mode = 'active';
        statusEl.textContent = '245,760 NODES ACTIVE';
      }
    } else if(mode === 'active'){
      drawSystem(1, now);
      drawWave(now);
    } else if(mode === 'collapsing'){
      const t = (now - collapseStart) / COLLAPSE_DURATION;
      const prog = Math.max(0, 1 - ease(Math.min(1,t)));
      updateSteps(prog);
      drawSystem(prog, now);
      waveProgress.style.width = '0%';
      if(t >= 1){
        mode = 'unity';
        ctx.clearRect(0,0,W,H);
        unityEl.classList.remove('opacity-0','scale-0','pointer-events-none');
        statusEl.textContent = '';
        updateSteps(0);
        waveSteps.forEach((el,i)=> el.style.opacity = i===0 ? '1':'0.4');
      }
    }
  }
  requestAnimationFrame(animate);

  // initial hint
  setTimeout(()=>{ if(mode==='unity') statusEl.textContent = '245,760 = 1'; }, 800);
  setTimeout(()=>{ if(mode==='unity') statusEl.textContent = ''; }, 2800);
})();
</script>
