<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ROOT 1 = CORE // 8-Petal Bitcoin Mining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  body {
    font-family: 'VT323', monospace;
    color:#0ff;
    background: radial-gradient(ellipse at center, #050510 0%, #000000 70%);
  }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; display:block; }
  #ui {
    position:fixed; inset:0; z-index:10; pointer-events:none;
    background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.8) 100%);
  }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:1.2rem 1.8rem; font-size:1.3rem; letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .title {
    color:#fff; text-shadow:0 0 4px #fff, 0 0 12px #0ff, 0 0 24px #0ff;
    opacity:0.95;
  }
  .upper {
    color:#ffd700; text-shadow:0 0 5px #ffaa00, 0 0 15px #ff8c00, 0 0 30px #ff5e00;
    background:rgba(0,0,0,0.7); padding:0.3rem 0.8rem; border:1px solid rgba(255,215,0,0.4);
    box-shadow:inset 0 0 10px rgba(255,140,0,0.2), 0 0 20px rgba(0,0,0,0.8);
  }
  #upperVal { font-size:1.5rem; margin-left:0.3rem; }
  .center-label {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    margin-top:110px; font-size:1.1rem; letter-spacing:0.2em;
    color:rgba(255,255,255,0.85); text-shadow:0 0 8px #fff, 0 0 20px #0ff;
    background:rgba(0,0,0,0.6); padding:0.25rem 0.8rem; border-radius:4px;
    border:1px solid rgba(255,255,255,0.15);
  }
  .symmetry {
    position:absolute; top:18%; left:50%; transform:translateX(-50%);
    font-size:4.5rem; font-weight:400; letter-spacing:0.15em;
    color:#ff00ff; opacity:0; transition:opacity 0.15s ease;
    text-shadow:0 0 10px #f0f, 0 0 30px #f0f, 0 0 60px #f0f;
    filter:blur(0.3px);
  }
  .symmetry.show { opacity:1; animation: flicker 0.15s infinite alternate; }
  @keyframes flicker {
    0% { opacity:0.9; text-shadow:0 0 10px #f0f, 0 0 30px #f0f; }
    100% { opacity:1; text-shadow:0 0 15px #f0f, 0 0 40px #f0f, 0 0 70px #f0f; }
  }
  .wave-counter {
    position:absolute; bottom:4.5rem; left:50%; transform:translateX(-50%);
    text-align:center; width:100%;
  }
  .wave-counter .label {
    font-size:1rem; color:#0ff; opacity:0.7; letter-spacing:0.4em; margin-bottom:0.2rem;
    text-shadow:0 0 8px #0ff;
  }
  .wave {
    font-size:4rem; line-height:1; color:#00ffff;
    text-shadow:0 0 8px #0ff, 0 0 20px #0ff, 0 0 40px #0088ff;
    transition:color 0.3s, text-shadow 0.3s; letter-spacing:0.1em;
  }
  .carry {
    font-size:2.2rem; margin-top:0.3rem; color:#ffee00;
    text-shadow:0 0 10px #ff0, 0 0 25px #ff8800; opacity:0;
    transform:translateY(15px) scale(0.9); transition:all 0.4s cubic-bezier(0.2,1.5,0.5,1);
    letter-spacing:0.08em;
  }
  .carry.show { opacity:1; transform:translateY(0) scale(1); }
  .block-found {
    position:absolute; top:11%; left:50%; transform:translateX(-50%) scale(0.7);
    font-size:2.8rem; white-space:nowrap; color:#000; font-weight:bold;
    padding:0.6rem 1.8rem; border-radius:6px;
    background:linear-gradient(180deg, #fff8c6 0%, #ffd700 30%, #ffaa00 100%);
    box-shadow:0 0 20px #ffd700, 0 0 50px #ff8c00, inset 0 0 12px rgba(255,255,255,0.8), inset 0 -4px 10px rgba(0,0,0,0.4);
    text-shadow:0 1px 0 rgba(255,255,255,0.8), 0 -1px 2px rgba(0,0,0,0.5);
    opacity:0; letter-spacing:0.04em; border:2px solid #fff3a0;
    transition:all 0.35s cubic-bezier(0.2,1.8,0.3,1);
  }
  .block-found.active {
    opacity:1; transform:translateX(-50%) scale(1);
    animation:pulseGold 0.6s ease-in-out infinite alternate;
  }
  @keyframes pulseGold {
    0% { box-shadow:0 0 20px #ffd700, 0 0 50px #ff8c00, inset 0 0 12px rgba(255,255,255,0.8); }
    100% { box-shadow:0 0 30px #ffd700, 0 0 80px #ff6a00, 0 0 120px #ff3c00, inset 0 0 15px rgba(255,255,255,1); }
  }
  .hex-displays {
    position:absolute; bottom:1.2rem; left:0; right:0; display:flex; justify-content:space-between;
    padding:0 1.5rem; font-size:1.2rem; opacity:0.9;
  }
  .hex { padding:0.3rem 0.7rem; background:rgba(0,0,0,0.7); border:1px solid currentColor; border-radius:4px; }
  .hex.left { color:#05d9e8; text-shadow:0 0 8px #05d9e8, 0 0 20px #05d9e8; box-shadow:0 0 15px rgba(5,217,232,0.2); }
  .hex.right { color:#ff2a6d; text-shadow:0 0 8px #ff2a6d, 0 0 20px #ff2a6d; box-shadow:0 0 15px rgba(255,42,109,0.2); }
  .axes-label {
    position:absolute; top:1.2rem; left:50%; transform:translateX(-50%);
    font-size:0.95rem; color:rgba(0,255,255,0.65); letter-spacing:0.25em;
    text-shadow:0 0 6px #0ff;
  }
  .scanlines {
    position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, transparent 2px, transparent 4px);
    opacity:0.4; mix-blend-mode:screen;
  }
  @media (max-width:768px) {
    .top-bar { padding:0.8rem 1rem; font-size:1rem; flex-direction:column; gap:0.4rem; align-items:flex-start; }
    .upper { align-self:flex-end; }
    .wave { font-size:2.6rem; }
    .carry { font-size:1.6rem; }
    .block-found { font-size:1.5rem; padding:0.4rem 1rem; top:14%; }
    .symmetry { font-size:2.8rem; top:22%; }
    .center-label { margin-top:80px; font-size:0.9rem; }
    .hex-displays { font-size:0.95rem; padding:0 0.8rem; bottom:0.8rem; }
    .wave-counter { bottom:3.5rem; }
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="scanlines"></div>
    <div class="axes-label">X=NONCE • Y=MERKLE • Z=TIMESTAMP</div>
    <div class="top-bar">
      <div class="title">BITCOIN MINING // 8-WAY OCTANT SEARCH</div>
      <div class="upper">UPPER 128: <span id="upperVal">1.000</span></div>
    </div>
    <div class="center-label" id="coreLabel">ROOT 1 = CORE</div>
    <div class="symmetry" id="symmetry">1 0 1</div>
    <div class="block-found" id="blockFound">0 0 0 1 — BLOCK FOUND</div>
    <div class="wave-counter">
      <div class="label">WAVE CARRY</div>
      <div id="wave" class="wave">9 9 9</div>
      <div id="carry" class="carry">→ 0 0 0 1</div>
    </div>
    <div class="hex-displays">
      <div class="hex left">Y+ : -0 0 8 0 0</div>
      <div class="hex right">Y- : -0 0 9 0 0</div>
    </div>
  </div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.025);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(6.5, 3.8, 6.5);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.4, 0.45, 0.15);
composer.addPass(bloom);

// Lights
scene.add(new THREE.AmbientLight(0x111122, 0.6));
const coreLight = new THREE.PointLight(0xffffff, 3, 20, 2);
coreLight.position.set(0,0,0);
scene.add(coreLight);

// Core
const coreGroup = new THREE.Group();
scene.add(coreGroup);
const coreGeo = new THREE.SphereGeometry(0.55, 48, 48);
const coreMat = new THREE.MeshStandardMaterial({
  color:0x0a0a0a, emissive:0xffffff, emissiveIntensity:1.2,
  metalness:0.9, roughness:0.15
});
const core = new THREE.Mesh(coreGeo, coreMat);
coreGroup.add(core);

// Core glow
const glowCan = document.createElement('canvas'); glowCan.width=512; glowCan.height=512;
const gtx = glowCan.getContext('2d');
const grd = gtx.createRadialGradient(256,256,0,256,256,256);
grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.2,'rgba(200,240,255,0.9)');
grd.addColorStop(0.4,'rgba(100,180,255,0.5)'); grd.addColorStop(1,'rgba(0,0,0,0)');
gtx.fillStyle=grd; gtx.fillRect(0,0,512,512);
const glowTex = new THREE.CanvasTexture(glowCan);
const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTex, color:0x88ddff, transparent:true, opacity:0.7, blending:THREE.AdditiveBlending, depthWrite:false
}));
glowSprite.scale.set(3.2,3.2,1);
coreGroup.add(glowSprite);

// Starfield
const stars = new THREE.BufferGeometry();
const starCount = 1500;
const spos = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r=40+Math.random()*30, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
  spos[i*3]=r*Math.sin(p)*Math.cos(t); spos[i*3+1]=r*Math.sin(p)*Math.sin(t); spos[i*3+2]=r*Math.cos(p);
}
stars.setAttribute('position', new THREE.BufferAttribute(spos,3));
const starMat = new THREE.PointsMaterial({color:0x00ddff, size:0.03, transparent:true, opacity:0.5, sizeAttenuation:true});
const starPoints = new THREE.Points(stars, starMat);
scene.add(starPoints);

// Petal data
const petalsData = [
  {label:'+X+Y+Z', color:'#ff2a6d', pos:new THREE.Vector3(1,1,1), y:'-0 0 8 0 0'},
  {label:'+X+Y-Z', color:'#05d9e8', pos:new THREE.Vector3(1,1,-1), y:'-0 0 8 0 0'},
  {label:'+X-Y+Z', color:'#00ff9f', pos:new THREE.Vector3(1,-1,1), y:'-0 0 9 0 0'},
  {label:'+X-Y-Z', color:'#ff8c00', pos:new THREE.Vector3(1,-1,-1), y:'-0 0 9 0 0'},
  {label:'-X+Y+Z', color:'#9d00ff', pos:new THREE.Vector3(-1,1,1), y:'-0 0 8 0 0'},
  {label:'-X+Y-Z', color:'#ffee00', pos:new THREE.Vector3(-1,1,-1), y:'-0 0 8 0 0'},
  {label:'-X-Y+Z', color:'#0066ff', pos:new THREE.Vector3(-1,-1,1), y:'-0 0 9 0 0'},
  {label:'-X-Y-Z', color:'#ff0040', pos:new THREE.Vector3(-1,-1,-1), y:'-0 0 9 0 0'},
];

const petals = [];
const dist = 3.4;

function createPetal(data){
  const group = new THREE.Group();
  const pos = data.pos.clone().normalize().multiplyScalar(dist);
  group.position.copy(pos);
  group.userData.basePos = pos.clone();
  
  // wire to core
  const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), pos.clone().multiplyScalar(0.75)]);
  const lineMat = new THREE.LineBasicMaterial({color:new THREE.Color(data.color), transparent:true, opacity:0.12});
  const line = new THREE.Line(lineGeo, lineMat);
  line.position.copy(pos.clone().negate());
  scene.add(line);

  // petal shape
  const shape = new THREE.Shape();
  shape.moveTo(0,0);
  shape.bezierCurveTo(0.35,0.4,0.28,1.1,0,1.65);
  shape.bezierCurveTo(-0.28,1.1,-0.35,0.4,0,0);
  const extr = new THREE.ExtrudeGeometry(shape, {depth:0.06, bevelEnabled:true, bevelThickness:0.025, bevelSize:0.02, bevelSegments:2});
  extr.translate(0,0,-0.03);
  const mat = new THREE.MeshPhysicalMaterial({
    color:new THREE.Color(data.color).multiplyScalar(0.15),
    emissive:new THREE.Color(data.color),
    emissiveIntensity:1.6,
    roughness:0.25, metalness:0.1, clearcoat:1, clearcoatRoughness:0.2,
    transparent:true, opacity:0.92, side:THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(extr, mat);
  mesh.rotation.x = Math.PI;
  group.add(mesh);

  const edges = new THREE.EdgesGeometry(extr);
  const edgeMat = new THREE.LineBasicMaterial({color:data.color, transparent:true, opacity:1});
  const edgeLines = new THREE.LineSegments(edges, edgeMat);
  edgeLines.rotation.x = Math.PI;
  group.add(edgeLines);

  // label canvas
  const labCan = document.createElement('canvas'); labCan.width=512; labCan.height=256;
  const ltx = labCan.getContext('2d');
  ltx.clearRect(0,0,512,256);
  ltx.font='bold 88px VT323'; ltx.textAlign='center'; ltx.textBaseline='middle';
  ltx.shadowColor=data.color; ltx.shadowBlur=25; ltx.fillStyle=data.color;
  ltx.fillText(data.label,256,80);
  ltx.font='44px VT323'; ltx.shadowBlur=15; ltx.fillStyle='#cfffff';
  ltx.fillText(data.y,256,175);
  const labTex = new THREE.CanvasTexture(labCan);
  const labSpr = new THREE.Sprite(new THREE.SpriteMaterial({map:labTex, transparent:true, depthTest:false}));
  labSpr.scale.set(1.6,0.8,1); labSpr.position.set(0,-1.05,0.15);
  group.add(labSpr);

  // counter
  const cntCan = document.createElement('canvas'); cntCan.width=256; cntCan.height=256;
  const ctx = cntCan.getContext('2d');
  const cntTex = new THREE.CanvasTexture(cntCan);
  const cntSpr = new THREE.Sprite(new THREE.SpriteMaterial({map:cntTex, transparent:true, depthTest:false}));
  cntSpr.scale.set(0.9,0.9,1); cntSpr.position.set(0,0.95,0.12);
  group.add(cntSpr);

  group.lookAt(0,0,0);
  group.userData = {...group.userData, mesh, edgeLines, color:data.color, label:data.label, cntCan, ctx, cntTex, lineMat};
  scene.add(group);
  petals.push(group);
  
  function drawCounter(txt, col){
    ctx.clearRect(0,0,256,256);
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.beginPath(); ctx.arc(128,128,115,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=4; ctx.globalAlpha=0.8; ctx.stroke(); ctx.globalAlpha=1;
    ctx.font='bold 120px VT323'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=28; ctx.fillText(txt,128,128);
    cntTex.needsUpdate=true;
  }
  group.userData.drawCounter = drawCounter;
  drawCounter('· · ·', data.color);
}

petalsData.forEach(createPetal);

// UI refs
const upperEl = document.getElementById('upperVal');
const symEl = document.getElementById('symmetry');
const waveEl = document.getElementById('wave');
const carryEl = document.getElementById('carry');
const blockEl = document.getElementById('blockFound');

const LOOP = 10000;
let lastT = -1;

function animate(now){
  requestAnimationFrame(animate);
  const t = (now % LOOP) / LOOP;
  
  // reset loop
  if(t < 0.02 && lastT > 0.98){
    petals.forEach(p=>{ p.position.copy(p.userData.basePos); p.scale.set(1,1,1); p.userData.drawCounter('· · ·', p.userData.color); });
  }
  lastT = t;

  // camera orbit
  const camR = 7.2;
  camera.position.x = Math.cos(now*0.00012) * camR;
  camera.position.z = Math.sin(now*0.00012) * camR;
  camera.position.y = 3.2 + Math.sin(now*0.00007)*0.8;
  camera.lookAt(0,0.1,0);
  starPoints.rotation.y += 0.00015;

  // core pulse
  const corePulse = 1 + Math.sin(now*0.003)*0.04;
  core.scale.setScalar(corePulse);
  coreMat.emissiveIntensity = 1.0 + Math.sin(now*0.0025)*0.15;
  glowSprite.rotation.z -= 0.002;

  // timeline
  const seqEnd = 0.7;
  let upperVal = 1;
  
  petals.forEach((p,i)=>{
    const start = i * 0.0875;
    const end = start + 0.075;
    let intensity = 1.2, scale = 1, active = false;
    
    if(t < seqEnd){
      if(t >= start && t < end){
        const pr = (t-start)/0.075;
        active = true;
        scale = 1 + Math.sin(pr*Math.PI)*0.35;
        intensity = 2.4 + Math.sin(pr*Math.PI)*1.2;
        const v = Math.min(9, Math.floor(pr*10.5));
        p.userData.drawCounter(`${v} ${v} ${v}`, p.userData.color);
        p.userData.lineMat.opacity = 0.25 + pr*0.2;
        upperVal = 1 - (i + pr)/8;
      } else if(t > end){
        p.userData.drawCounter('· · ·', p.userData.color);
        p.userData.lineMat.opacity = 0.08;
      }
    } else if(t < 0.85){
      scale = 1.12 + Math.sin(now*0.008 + i)*0.05;
      intensity = 2.2;
      p.userData.drawCounter('9 9 9', p.userData.color);
      p.userData.lineMat.opacity = 0.18;
      upperVal = 0;
    } else if(t < 0.9){
      const c = (t-0.85)/0.05;
      scale = 1.12*(1-c*0.9);
      intensity = 2.2*(1-c) + 0.3;
      p.position.lerpVectors(p.userData.basePos, new THREE.Vector3(0,0,0), c*0.85);
      p.userData.drawCounter('0 0 0', p.userData.color);
      p.userData.lineMat.opacity = 0.18*(1-c);
    } else {
      scale = 0.45;
      intensity = 0.4;
      p.position.copy(p.userData.basePos).multiplyScalar(0.15);
      p.userData.drawCounter('0 0 0', p.userData.color);
    }
    
    p.userData.mesh.material.emissiveIntensity = intensity;
    p.userData.mesh.scale.setScalar(scale);
    p.userData.edgeLines.material.opacity = 0.6 + intensity*0.15;
    if(active) p.rotation.z = Math.sin(now*0.01 + i)*0.05;
  });
  
  upperEl.textContent = Math.max(0, upperVal).toFixed(3);
  
  // symmetry flashes
  if((t>0.20 && t<0.265) || (t>0.50 && t<0.565)){
    symEl.classList.add('show');
    symEl.textContent = t<0.3 ? '1 0 1' : '8 0 8';
    symEl.style.color = t<0.3 ? '#00ffff' : '#ff00ff';
  } else {
    symEl.classList.remove('show');
  }
  
  // wave
  if(t < 0.83){
    waveEl.textContent = '9 9 9';
    waveEl.style.color = '#00ffff';
    waveEl.style.textShadow = '0 0 8px #0ff, 0 0 20px #0ff, 0 0 40px #0088ff';
    carryEl.classList.remove('show');
  } else if(t < 0.9){
    waveEl.textContent = '0 0 0';
    waveEl.style.color = '#ffee00';
    waveEl.style.textShadow = '0 0 10px #ff0, 0 0 30px #ff8800';
    carryEl.classList.add('show');
  } else {
    waveEl.textContent = '0 0 0';
    carryEl.classList.add('show');
  }
  
  // block found
  const isFound = t > 0.9 && t < 0.985;
  if(isFound){
    blockEl.classList.add('active');
    coreMat.emissive.setHex(0xffd700);
    coreMat.emissiveIntensity = 4.5;
    coreMat.color.setHex(0x332200);
    coreLight.color.setHex(0xffcc33);
    coreLight.intensity = 6;
    glowSprite.material.color.setHex(0xffdd55);
    glowSprite.material.opacity = 1;
    glowSprite.scale.setScalar(5.5 + Math.sin(now*0.02)*0.3);
    bloom.strength = 1.8;
  } else {
    blockEl.classList.remove('active');
    coreMat.emissive.setHex(0xffffff);
    coreMat.color.setHex(0x0a0a0a);
    coreLight.color.setHex(0xffffff);
    coreLight.intensity = 2.5;
    glowSprite.material.color.setHex(0x88ddff);
    glowSprite.material.opacity = 0.65;
    glowSprite.scale.setScalar(3.2);
    bloom.strength = 1.35;
  }
  
  composer.render();
}
animate(0);

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
